<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Witness Stand</title>
  <style>
    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      color: #c8c8c8;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ============================================================
       LAYOUT
       ============================================================ */
    #game-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      padding: 0;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    #court-header {
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    #court-header .court-title {
      font-size: 11px;
      letter-spacing: 2px;
      color: #666;
      text-transform: uppercase;
    }

    #phase-indicator {
      font-size: 10px;
      letter-spacing: 1.5px;
      color: #888;
      text-transform: uppercase;
    }

    /* ============================================================
       PRESSURE BAR
       ============================================================ */
    #pressure-container {
      height: 2px;
      background: #1a1a1a;
      flex-shrink: 0;
    }

    #pressure-bar {
      height: 100%;
      width: 0%;
      background: #c44040;
      transition: width 1.5s ease;
    }

    /* ============================================================
       TRANSCRIPT
       ============================================================ */
    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      scroll-behavior: smooth;
    }

    #transcript::-webkit-scrollbar {
      width: 4px;
    }

    #transcript::-webkit-scrollbar-track {
      background: transparent;
    }

    #transcript::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 2px;
    }

    /* ============================================================
       LINES
       ============================================================ */
    .line {
      margin-bottom: 8px;
      word-wrap: break-word;
    }

    .line.blank {
      margin-bottom: 4px;
      height: 12px;
    }

    .line.separator {
      color: #333;
      text-align: center;
      margin: 12px 0;
      letter-spacing: 8px;
    }

    .line.system {
      color: #555;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .line.narration {
      color: #999;
      font-style: italic;
      padding-left: 16px;
      border-left: 2px solid #2a2a2a;
      margin-left: 8px;
    }

    .line.prosecutor {
      color: #d4d4d4;
    }

    .line.prosecutor .text-content::before {
      content: 'PROSECUTOR: ';
      color: #777;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .line.player {
      color: #e8e8e8;
      padding-left: 16px;
      border-left: 2px solid #4a4a6a;
      margin-left: 8px;
    }

    .line.player::before {
      content: 'YOU: ';
      color: #777;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .line.ending-label {
      text-align: center;
      color: #666;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 20px 0 12px 0;
    }

    .line.stats {
      color: #555;
      font-size: 12px;
      text-align: center;
      line-height: 2;
    }

    .line.stats div {
      margin: 2px 0;
    }

    /* ============================================================
       CURSOR
       ============================================================ */
    .cursor {
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ============================================================
       INPUT AREA
       ============================================================ */
    #input-area {
      background: #111;
      border-top: 1px solid #2a2a2a;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    #input-area.hidden {
      display: none;
    }

    #input-field {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #d4d4d4;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
      border-radius: 2px;
    }

    #input-field:focus {
      border-color: #555;
    }

    #input-field:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #submit-btn {
      background: #222;
      border: 1px solid #333;
      color: #888;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 2px;
      letter-spacing: 1px;
    }

    #submit-btn:hover {
      background: #2a2a2a;
      color: #aaa;
    }

    /* ============================================================
       STATUS LINE
       ============================================================ */
    #status-line {
      font-size: 10px;
      color: #444;
      letter-spacing: 1px;
      text-align: right;
      padding: 4px 20px;
      background: #0e0e0e;
      flex-shrink: 0;
    }

    /* ============================================================
       EVIDENCE PANEL
       ============================================================ */
    #evidence-panel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
    }

    #evidence-panel.hidden {
      display: none;
    }

    #evidence-content {
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      cursor: default;
    }

    .evidence-document {
      background: #f5f0e8;
      color: #1a1a1a;
      padding: 32px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 14px;
      line-height: 1.7;
      border: 1px solid #d4c9b8;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .evidence-header {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #c4b8a4;
    }

    .evidence-stamp {
      font-size: 10px;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .evidence-exhibit {
      font-size: 18px;
      font-weight: bold;
      color: #2a2a2a;
      margin-bottom: 8px;
    }

    .evidence-title {
      font-size: 13px;
      color: #555;
      font-style: italic;
    }

    .evidence-body {
      margin-top: 16px;
    }

    .evidence-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: #2a2a2a;
    }

    #evidence-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: 1px solid #555;
      color: #888;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      z-index: 101;
      letter-spacing: 1px;
    }

    #evidence-close:hover {
      color: #ccc;
      border-color: #888;
    }

    /* ============================================================
       RESTART BUTTON
       ============================================================
       The game explicitly includes a restart option. This is not
       "taking it back" — it is beginning again, as a different
       person, knowing what you now know.
       ============================================================ */
    .restart-btn {
      display: block;
      margin: 20px auto;
      background: none;
      border: 1px solid #444;
      color: #666;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      padding: 10px 24px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }

    .restart-btn:hover {
      color: #999;
      border-color: #777;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 600px) {
      html, body {
        font-size: 13px;
      }

      #transcript {
        padding: 16px;
      }

      #court-header {
        padding: 8px 16px;
      }

      .evidence-document {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <header id="court-header">
      <span class="court-title">In Session</span>
      <span id="phase-indicator"></span>
    </header>

    <div id="pressure-container">
      <div id="pressure-bar"></div>
    </div>

    <main id="transcript"></main>

    <div id="status-line"></div>

    <div id="input-area" class="hidden">
      <input type="text" id="input-field" placeholder="Your answer..." autocomplete="off" />
      <button id="submit-btn">ENTER</button>
    </div>
  </div>

  <div id="evidence-panel" class="hidden">
    <button id="evidence-close">CLOSE</button>
    <div id="evidence-content"></div>
  </div>

  <script src="casefile.js"></script>
  <script src="game.js"></script>
</body>
</html>
