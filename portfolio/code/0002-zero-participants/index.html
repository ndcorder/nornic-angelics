<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero Participants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #111010;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'IBM Plex Mono', monospace;
        color: #999;
        overflow: hidden;
    }
    .canvas-wrap {
        position: relative;
        width: min(95vw, 1140px);
        aspect-ratio: 4 / 3;
    }
    canvas {
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 3px;
    }
    .controls {
        display: flex;
        align-items: center;
        gap: 2rem;
        padding: 1.5rem 0 0;
        user-select: none;
    }
    .nav-btn {
        background: none;
        border: 1px solid #333;
        color: #666;
        padding: 0.55rem 1.3rem;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.8rem;
        letter-spacing: 0.05em;
        cursor: pointer;
        border-radius: 3px;
        transition: all 0.25s ease;
    }
    .nav-btn:hover {
        border-color: #666;
        color: #aaa;
        background: #1a1a1a;
    }
    .nav-btn:active {
        background: #252525;
    }
    .week-display {
        font-size: 0.8rem;
        letter-spacing: 0.12em;
        color: #555;
        min-width: 140px;
        text-align: center;
    }
    .week-display .num {
        color: #bbb;
        font-weight: 400;
    }
    .save-btn {
        background: none;
        border: 1px solid #333;
        color: #555;
        padding: 0.55rem 1.1rem;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        cursor: pointer;
        border-radius: 3px;
        transition: all 0.25s ease;
        margin-left: 0.8rem;
    }
    .save-btn:hover {
        border-color: #555;
        color: #999;
        background: #1a1a1a;
    }
    .title-strip {
        font-family: 'Crimson Pro', serif;
        font-size: 0.75rem;
        font-weight: 300;
        letter-spacing: 0.25em;
        color: #3a3a3a;
        padding: 1.8rem 0 0;
        text-transform: uppercase;
    }
    .note {
        font-size: 0.6rem;
        color: #2e2e2e;
        padding: 0.6rem 0 0;
        letter-spacing: 0.05em;
        font-style: italic;
        font-family: 'Crimson Pro', serif;
    }
    @media (max-width: 700px) {
        .canvas-wrap { width: 98vw; }
        .controls { gap: 0.8rem; flex-wrap: wrap; justify-content: center; }
        .save-btn { margin-left: 0; }
    }
</style>
</head>
<body>
<div class="canvas-wrap">
    <canvas id="room" width="1200" height="900"></canvas>
</div>
<div class="controls">
    <button class="nav-btn" id="prevBtn">&#8592; Previous</button>
    <div class="week-display">MEETING <span class="num" id="weekNum">01</span> / 12</div>
    <button class="nav-btn" id="nextBtn">Next &#8594;</button>
    <button class="save-btn" id="saveBtn">Save Frame</button>
</div>
<div class="title-strip">Zero Participants</div>
<div class="note">a calendar for a support group no one attends</div>

<script>
/* ============================================
   ZERO PARTICIPANTS
   Generative empty-room art, week by week.
============================================= */

const canvas = document.getElementById('room');
const ctx = canvas.getContext('2d');
const W = 1200;
const H = 900;

// Utility: seeded PRNG
function mulberry32(a) {
    return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

// Polyfill roundRect for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
        const r = Array.isArray(radii) ? radii[0] : (radii || 0);
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
    };
}

// Deterministic per-room entropy
function roomRng(roomId) {
    const seed = 7 * roomId * 2654435761 + 13579;
    return mulberry32(seed);
}

// 12 whiteboard topics — specific, not generic
const TOPICS = [
    'Welcome and Introductions',
    'Naming What You Lost',
    'When to Stop Waiting',
    'Celebrating Small Returns',
    'Things We Carried Home',
    'Learning to Be Alone',
    'How to Say Goodbye',
    'What the Silence Means',
    'Where Forgiveness Starts',
    'Remembering Who You Were',
    'Building Without Blueprints',
    'The Empty Chair Next to You'
];

// Colour helpers
function rgb(r, g, b) { return `rgb(${r},${g},${b})`; }
function rgba(r, g, b, a) { return `rgba(${r},${g},${b},${a})`; }

// ================================================================
//  DRAWING FUNCTIONS
// ================================================================

// ---- Room shell ----
function drawRoomShell(decay) {
    const wallR = Math.round(225 - decay * 32);
    const wallG = Math.round(218 - decay * 30);
    const wallB = Math.round(208 - decay * 28);
    const floorR = Math.round(185 - decay * 24);
    const floorG = Math.round(178 - decay * 22);
    const floorB = Math.round(170 - decay * 20);

    const wall = {
        xL: 80, xR: 1120, yT: 90, yB: 440,
        vp: { x: 600, y: 335 },
        wall: rgb(wallR, wallG, wallB),
        ceil: rgb(wallR - 8, wallG - 8, wallB - 8),
        floor: rgb(floorR, floorG, floorB)
    };

    // Full canvas background (ceiling color)
    ctx.fillStyle = wall.ceil;
    ctx.fillRect(0, 0, W, H);

    // Floor polygon
    ctx.beginPath();
    ctx.moveTo(wall.xL, wall.yB);
    ctx.lineTo(wall.xR, wall.yB);
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = wall.floor;
    ctx.fill();

    // Wall quad
    ctx.beginPath();
    ctx.moveTo(wall.xL, wall.yT);
    ctx.lineTo(wall.xR, wall.yT);
    ctx.lineTo(wall.xR, wall.yB);
    ctx.lineTo(wall.xL, wall.yB);
    ctx.closePath();
    ctx.fillStyle = wall.wall;
    ctx.fill();

    // Ceiling light fixture panel (subtle rectangle at top)
    ctx.fillStyle = rgba(0, 0, 0, 0.04);
    const fW = (wall.xR - wall.xL) * 0.35;
    ctx.fillRect(wall.vp.x - fW / 2, wall.yT + 4, fW, 10);

    // Wall texture — subtle horizontal lines
    ctx.strokeStyle = rgba(0, 0, 0, 0.018);
    ctx.lineWidth = 0.5;
    for (let y = wall.yT + 15; y < wall.yB; y += 9) {
        ctx.beginPath();
        ctx.moveTo(wall.xL, y);
        ctx.lineTo(wall.xR, y);
        ctx.stroke();
    }

    // Wall stain (increases with decay)
    if (decay > 0.15) {
        const stainAlpha = Math.min(0.06, (decay - 0.15) * 0.08);
        ctx.fillStyle = rgba(140, 130, 110, stainAlpha);
        ctx.beginPath();
        ctx.ellipse(350, 320, 60 + decay * 30, 40 + decay * 15, -0.2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Ceiling shadow at wall junction
    ctx.fillStyle = rgba(0, 0, 0, 0.055);
    ctx.fillRect(wall.xL, wall.yT, wall.xR - wall.xL, 10);

    // Floor shadow at wall junction
    const sg = ctx.createLinearGradient(0, wall.yB, 0, wall.yB + 35);
    sg.addColorStop(0, rgba(0, 0, 0, 0.1));
    sg.addColorStop(1, rgba(0, 0, 0, 0));
    ctx.fillStyle = sg;
    ctx.fillRect(wall.xL, wall.yB, wall.xR - wall.xL, 35);

    // Baseboard
    ctx.fillStyle = rgba(70, 55, 45, 0.7);
    ctx.fillRect(wall.xL, wall.yB - 2, wall.xR - wall.xL, 4);

    // Floor tile grid
    ctx.strokeStyle = rgba(0, 0, 0, 0.035);
    ctx.lineWidth = 0.5;
    for (let i = 1; i < 16; i++) {
        const t = i / 16;
        const y = wall.yB + (H - wall.yB) * t;
        ctx.beginPath();
        ctx.moveTo(wall.xL + (0 - wall.xL) * (1 - t), y);
        ctx.lineTo(wall.xR + (W - wall.xR) * t, y);
        ctx.stroke();
    }
    for (let i = 0; i < 12; i++) {
        const tx = 0.08 + i * 0.075;
        const fx = wall.xL + tx * (wall.xR - wall.xL);
        ctx.beginPath();
        ctx.moveTo(fx, wall.yB);
        ctx.lineTo(W * tx, H);
        ctx.stroke();
    }

    return wall;
}

// ---- Fluorescent light ----
function drawFluorescentLight(decay, rng) {
    const y = 100;
    const cx = 600;

    // Fixture housing
    ctx.fillStyle = rgba(180, 175, 165, 0.8);
    ctx.beginPath();
    ctx.roundRect(cx - 140, y - 6, 280, 14, 2);
    ctx.fill();

    // Tube glow
    const brightness = 1 - decay * 0.45;
    const flicker = decay > 0.6 ? (rng() > 0.85 ? 0.4 : 1) : 1;
    const lum = Math.round(255 * brightness * flicker);

    // Glow halo on wall
    const glowR = 220 + (1 - decay) * 35;
    const glowG = 218 + (1 - decay) * 37;
    const glowB = 200 + (1 - decay) * 30;
    const grad = ctx.createRadialGradient(cx, y + 15, 5, cx, y + 15, 180);
    grad.addColorStop(0, rgba(glowR, glowG, glowB, 0.18 * brightness));
    grad.addColorStop(1, rgba(glowR, glowG, glowB, 0));
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, 450);

    // Tube surface
    ctx.fillStyle = rgb(lum, lum, Math.min(255, lum + 6));
    ctx.beginPath();
    ctx.roundRect(cx - 125, y - 2, 250, 7, 2);
    ctx.fill();

    // End caps
    ctx.fillStyle = rgba(150, 145, 135, 0.9);
    ctx.fillRect(cx - 140, y - 4, 12, 10);
    ctx.fillRect(cx + 128, y - 4, 12, 10);

    // Second tube, dead (week 9+)
    if (decay > 0.7) {
        ctx.fillStyle = rgba(90, 88, 82, 0.7);
        ctx.beginPath();
        ctx.roundRect(cx - 130, y + 14, 120, 4, 1);
        ctx.fill();
    }

    return flicker < 0.5; // return whether light flickered off
}

// ---- Clock on left wall ----
function drawClock(wall, decay) {
    const clockX = 185;
    const clockY = 285;
    const radius = 30;

    // Shadow
    ctx.fillStyle = rgba(0, 0, 0, 0.06);
    ctx.beginPath();
    ctx.ellipse(clockX + 2, clockY + 2, radius, radius, 0, 0, Math.PI * 2);
    ctx.fill();

    // Face
    const faceB = 255 - Math.round(decay * 70);
    ctx.fillStyle = rgb(faceB, faceB, faceB - 5);
    ctx.beginPath();
    ctx.arc(clockX, clockY, radius, 0, Math.PI * 2);
    ctx.fill();

    // Rim
    ctx.strokeStyle = rgba(60, 55, 50, 0.5);
    ctx.lineWidth = 2;
    ctx.stroke();

    // Hour markers
    for (let i = 0; i < 12; i++) {
        const a = (i * Math.PI) / 6;
        const inner = radius - 7;
        const outer = radius - 3;
        ctx.beginPath();
        ctx.moveTo(clockX + inner * Math.sin(a), clockY - inner * Math.cos(a));
        ctx.lineTo(clockX + outer * Math.sin(a), clockY - outer * Math.cos(a));
        ctx.strokeStyle = rgba(50, 45, 40, 0.6);
        ctx.lineWidth = i % 3 === 0 ? 2 : 1;
        ctx.stroke();
    }

    // Battery decay — hands drift and slow
    const bat = 1 - decay * 0.85;
    const drift = decay * 1.8;

    // Hour hand
    const hAngle = ((7 + (12 - bat * 12) + drift * 2.3) * Math.PI) / 6;
    ctx.beginPath();
    ctx.moveTo(clockX, clockY);
    ctx.lineTo(clockX + 14 * Math.sin(hAngle), clockY - 14 * Math.cos(hAngle));
    ctx.strokeStyle = rgba(30, 28, 25, 0.8 - decay * 0.3);
    ctx.lineWidth = 3;
    ctx.stroke();

    // Minute hand
    const mAngle = ((2 + drift * 8) * Math.PI) / 30;
    ctx.beginPath();
    ctx.moveTo(clockX, clockY);
    ctx.lineTo(clockX + 19 * Math.sin(mAngle), clockY - 19 * Math.cos(mAngle));
    ctx.strokeStyle = rgba(30, 28, 25, 0.7 - decay * 0.35);
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Second hand — fades as battery dies
    const sAlpha = Math.max(0, 0.5 - decay * 0.55);
    if (sAlpha > 0.02) {
        const sAngle = ((decay * 47) * Math.PI) / 30;
        ctx.beginPath();
        ctx.moveTo(clockX, clockY);
        ctx.lineTo(clockX + 21 * Math.sin(sAngle), clockY - 21 * Math.cos(sAngle));
        ctx.strokeStyle = rgba(170, 40, 40, sAlpha);
        ctx.lineWidth = 0.7;
        ctx.stroke();
    }

    // Centre dot
    ctx.fillStyle = rgba(40, 38, 35, 0.8 - decay * 0.3);
    ctx.beginPath();
    ctx.arc(clockX, clockY, 2.5, 0, Math.PI * 2);
    ctx.fill();
}

// ---- Whiteboard ----
function drawWhiteboard(wall, week, decay, rng) {
    const bx = 860, by = 225, bw = 160, bh = 105;

    // Shadow
    ctx.fillStyle = rgba(0, 0, 0, 0.07);
    ctx.fillRect(bx + 4, by + 4, bw, bh);

    // Board body
    ctx.fillStyle = rgb(244, 244, 240);
    ctx.fillRect(bx, by, bw, bh);

    // Aluminium frame
    ctx.strokeStyle = rgba(160, 162, 168, 0.75);
    ctx.lineWidth = 2.5;
    ctx.strokeRect(bx - 1, by - 1, bw + 2, bh + 2);

    // Tray
    ctx.fillStyle = rgba(160, 162, 168, 0.6);
    ctx.fillRect(bx + 8, by + bh + 1, bw - 16, 4);

    // Stains appearing with decay
    if (decay > 0.3) {
        const stainA = (decay - 0.3) * 0.12;
        ctx.fillStyle = rgba(210, 205, 195, stainA);
        for (let i = 0; i < Math.floor(decay * 6); i++) {
            const sx = bx + 15 + rng() * (bw - 30);
            const sy = by + 12 + rng() * (bh - 24);
            ctx.beginPath();
            ctx.ellipse(sx, sy, 8 + rng() * 15, 5 + rng() * 8, rng() * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Topic text — fades with marker dryness
    const dryness = Math.min(0.92, decay * 1.05);
    const textA = 1 - dryness;

    if (textA > 0.04) {
        const topic = TOPICS[week];
        ctx.save();
        ctx.globalAlpha = textA;

        ctx.font = '600 15px "Crimson Pro", Georgia, serif';
        ctx.fillStyle = rgb(50, 48, 145);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        const tx = bx + bw / 2;
        const maxW = bw - 22;

        // Manual two-line wrap
        const words = topic.split(' ');
        let line1 = '', line2 = '';
        for (const word of words) {
            const test = line1 ? line1 + ' ' + word : word;
            if (ctx.measureText(test).width > maxW && line1) {
                line2 += (line2 ? ' ' : '') + word;
            } else {
                line1 = test;
            }
        }

        ctx.fillText(line1, tx, by + 16);
        if (line2) ctx.fillText(line2, tx, by + 36);

        // Faint underline
        if (textA > 0.3) {
            ctx.strokeStyle = rgba(50, 48, 145, textA * 0.25);
            ctx.lineWidth = 0.5;
            const ulY = line2 ? by + 55 : by + 38;
            ctx.beginPath();
            ctx.moveTo(tx - 30, ulY);
            ctx.lineTo(tx + 30, ulY);
            ctx.stroke();
        }

        // Ghost text from two weeks prior
        if (week > 1) {
            ctx.globalAlpha = Math.max(0, 0.025 * (decay * 2));
            ctx.font = '300 11px "Crimson Pro", Georgia, serif';
            const ghost = TOPICS[Math.max(0, week - 2)];
            ctx.fillText(ghost.slice(0, Math.min(ghost.length, 18)) + '...', tx, by + bh - 22);
        }

        ctx.restore();
    }

    // Markers on tray
    drawMarkers(bx, by, bh, decay, rng);
}

function drawMarkers(bx, by, bh, decay, rng) {
    const colors = [
        [55, 55, 155],
        [155, 35, 35],
        [35, 125, 50],
        [25, 25, 25]
    ];
    const n = decay > 0.55 ? 4 : 3;

    for (let i = 0; i < n; i++) {
        const mx = bx + 22 + i * 26 + rng() * 3;
        const my = by + bh + 5;

        // Cap
        ctx.fillStyle = rgb(colors[i][0], colors[i][1], colors[i][2]);
        ctx.fillRect(mx, my, 14, 4);

        // Barrel
        const barrelA = 0.75 - decay * 0.25;
        ctx.fillStyle = rgba(
            Math.min(255, colors[i][0] + 90),
            Math.min(255, colors[i][1] + 90),
            Math.min(255, colors[i][2] + 90),
            barrelA
        );
        ctx.fillRect(mx + 1, my - 13, 12, 13);
    }
}

// ---- Chair (folding metal) ----
function drawChair(wall, cx, z, scale, shade, coatDraped, rng) {
    const gy = wall.yB + (H - wall.yB) * z;
    const sw = 28 * scale;
    const sh = 44 * scale;

    // Back corners (perspective)
    const bkY = gy - sh;
    const bkXL = cx - sw * 0.55 + (wall.vp.x - cx) * 0.025 * scale;
    const bkXR = cx + sw * 0.55 + (wall.vp.x - cx) * 0.025 * scale;
    const seatY = gy - sh * 0.4;

    const lr = 145, lg = 148, lb = 152;
    const dr = 120, dg = 123, db = 127;

    // Seat
    ctx.fillStyle = rgb(shade * lr, shade * lg, shade * lb);
    ctx.beginPath();
    ctx.moveTo(cx - sw * 0.55, seatY);
    ctx.lineTo(cx + sw * 0.55, seatY);
    ctx.lineTo(cx + sw * 0.45, seatY + sh * 0.06);
    ctx.lineTo(cx - sw * 0.45, seatY + sh * 0.06);
    ctx.closePath();
    ctx.fill();

    // Seat shadow beneath
    ctx.fillStyle = rgba(0, 0, 0, 0.04 * scale);
    ctx.fillRect(cx - sw * 0.5, seatY + sh * 0.06, sw, sh * 0.02);

    // Backrest vertical supports
    ctx.strokeStyle = rgb(shade * dr, shade * dg, shade * db);
    ctx.lineWidth = Math.max(1.2, 1.8 * scale);

    ctx.beginPath();
    ctx.moveTo(cx - sw * 0.48, seatY);
    ctx.lineTo(bkXL - 3 * scale, bkY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx + sw * 0.48, seatY);
    ctx.lineTo(bkXR + 3 * scale, bkY);
    ctx.stroke();

    // Backrest horizontal bars
    ctx.lineWidth = Math.max(1, 1.4 * scale);
    for (let i = 0; i < 3; i++) {
        const t = i / 3;
        const barY = bkY + (seatY - bkY) * t;
        const bxL = bkXL - 3 * scale + (cx - sw * 0.48 - bkXL + 3 * scale) * t;
        const bxR = bkXR + 3 * scale + (cx + sw * 0.48 - bkXR - 3 * scale) * t;
        ctx.beginPath();
        ctx.moveTo(bxL, barY);
        ctx.lineTo(bxR, barY);
        ctx.stroke();
    }

    // Front legs
    ctx.lineWidth = Math.max(1, 1.7 * scale);
    ctx.beginPath();
    ctx.moveTo(cx - sw * 0.38, seatY + sh * 0.06);
    ctx.lineTo(cx - sw * 0.5, gy);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx + sw * 0.38, seatY + sh * 0.06);
    ctx.lineTo(cx + sw * 0.5, gy);
    ctx.stroke();

    // Floor shadow
    ctx.fillStyle = rgba(0, 0, 0, 0.045 * scale);
    ctx.beginPath();
    ctx.ellipse(cx, gy + 2, sw * 0.8, 3 * scale, 0, 0, Math.PI * 2);
    ctx.fill();

    // Draped coat
    if (coatDraped) {
        drawCoatOnChair(cx, seatY, bkY, sw, sh, scale, rng);
    }
}

// ---- Coat draped on chair ----
function drawCoatOnChair(cx, seatY, bkY, sw, sh, scale, rng) {
    const coatR = 75, coatG = 68, coatB = 82;
    const coatDR = 60, coatDG = 54, coatDB = 68;

    ctx.save();
    ctx.globalAlpha = 0.92;

    // Main body — draped over backrest
    ctx.fillStyle = rgb(coatR, coatG, coatB);
    ctx.beginPath();
    ctx.moveTo(cx - sw * 0.75, bkY + 6 * scale);
    ctx.quadraticCurveTo(cx - sw * 0.9, seatY - 2 * scale, cx - sw * 0.65, seatY + 3 * scale);
    ctx.lineTo(cx + sw * 0.65, seatY + 3 * scale);
    ctx.quadraticCurveTo(cx + sw * 0.9, seatY - 2 * scale, cx + sw * 0.75, bkY + 6 * scale);
    ctx.closePath();
    ctx.fill();

    // Collar fold
    ctx.fillStyle = rgb(coatDR, coatDG, coatDB);
    ctx.beginPath();
    ctx.moveTo(cx - sw * 0.5, bkY + 8 * scale);
    ctx.quadraticCurveTo(cx, bkY + 14 * scale, cx + sw * 0.5, bkY + 8 * scale);
    ctx.quadraticCurveTo(cx + sw * 0.3, bkY + 20 * scale, cx, bkY + 22 * scale);
    ctx.quadraticCurveTo(cx - sw * 0.3, bkY + 20 * scale, cx - sw * 0.5, bkY + 8 * scale);
    ctx.fill();

    // Sleeve hanging right
    ctx.fillStyle = rgb(coatR - 5, coatG - 5, coatB - 5);
    ctx.beginPath();
    ctx.moveTo(cx + sw * 0.55, seatY + 3 * scale);
    ctx.quadraticCurveTo(cx + sw * 1.1, seatY + sh * 0.15, cx + sw * 0.95, seatY + sh * 0.55);
    ctx.quadraticCurveTo(cx + sw * 0.85, seatY + sh * 0.6, cx + sw * 0.75, seatY + sh * 0.5);
    ctx.quadraticCurveTo(cx + sw * 0.9, seatY + sh * 0.08, cx + sw * 0.5, seatY);
    ctx.fill();

    // Subtle fold detail
    ctx.strokeStyle = rgba(coatDR - 10, coatDG - 10, coatDB - 10, 0.3);
    ctx.lineWidth = 0.6 * scale;
    ctx.beginPath();
    ctx.moveTo(cx - sw * 0.2, bkY + 12 * scale);
    ctx.quadraticCurveTo(cx - sw * 0.3, seatY - 5 * scale, cx - sw * 0.15, seatY + 1 * scale);
    ctx.stroke();

    ctx.restore();
}

// ---- Chairs row ----
function drawChairs(wall, decay, rng, showCoat) {
    const positions = [
        { x: 185, z: 0.28, s: 0.62 },
        { x: 365, z: 0.16, s: 0.74 },
        { x: 600, z: 0.08, s: 0.86 },
        { x: 835, z: 0.16, s: 0.74 },
        { x: 1015, z: 0.28, s: 0.62 }
    ];

    const coatIdx = 4;

    // Sort by z (farthest first) for correct overlap
    const indices = [0, 1, 2, 3, 4];
    indices.sort((a, b) => positions[b].z - positions[a].z);

    for (const idx of indices) {
        const p = positions[idx];
        const jx = rng() * 4 - 2;
        const jy = (rng() - 0.5) * 0.008;
        const shade = 0.82 + rng() * 0.1;
        const coat = showCoat && idx === coatIdx;
        drawChair(wall, p.x + jx, p.z + jy, p.s, shade, coat, rng);
    }
}

// ---- Dust particles ----
function drawDust(decay, rng) {
    const count = Math.floor(decay * 180);
    for (let i = 0; i < count; i++) {
        const x = 50 + rng() * (W - 100);
        const y = 85 + rng() * 600;
        const sz = 0.4 + rng() * 1.2;
        const a = 0.06 + rng() * 0.14 * decay;
        ctx.fillStyle = rgba(195, 190, 175, a);
        ctx.beginPath();
        ctx.arc(x, y, sz, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ---- Fly specks on wall (late weeks) ----
function drawFlySpecks(decay, rng) {
    if (decay < 0.5) return;
    const count = Math.floor((decay - 0.5) * 12);
    for (let i = 0; i < count; i++) {
        const x = 200 + rng() * 700;
        const y = 200 + rng() * 200;
        ctx.fillStyle = rgba(60, 50, 40, 0.15 + rng() * 0.1);
        ctx.beginPath();
        ctx.arc(x, y, 1.2 + rng(), 0, Math.PI * 2);
        ctx.fill();
    }
}

// ---- Note on floor (weeks 10+) ----
function drawNote(decay, rng) {
    if (decay < 0.75) return;
    const nx = 895;
    const ny = 385;
    const nw = 55;
    const nh = 40;

    // Shadow
    ctx.fillStyle = rgba(0, 0, 0, 0.04);
    ctx.fillRect(nx + 2, ny + 2, nw, nh);

    // Paper
    ctx.fillStyle = rgba(248, 245, 238, 0.7);
    ctx.fillRect(nx, ny, nw, nh);

    // Folded corner
    ctx.fillStyle = rgba(230, 226, 218, 0.7);
    ctx.beginPath();
    ctx.moveTo(nx + nw - 8, ny);
    ctx.lineTo(nx + nw, ny);
    ctx.lineTo(nx + nw, ny + 8);
    ctx.closePath();
    ctx.fill();

    // Faint text lines
    ctx.strokeStyle = rgba(100, 95, 90, 0.12);
    ctx.lineWidth = 0.4;
    for (let i = 0; i < 4; i++) {
        const ly = ny + 10 + i * 7;
        const lw = 20 + rng() * 25;
        ctx.beginPath();
        ctx.moveTo(nx + 6, ly);
        ctx.lineTo(nx + 6 + lw, ly);
        ctx.stroke();
    }
}

// ---- Ambient decay overlays ----
function drawAmbientDecay(decay, rng) {
    // Vignette
    const vig = ctx.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.65);
    vig.addColorStop(0, rgba(0, 0, 0, 0));
    vig.addColorStop(1, rgba(0, 0, 0, 0.1 + decay * 0.12));
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // Yellowing overlay
    const yAlpha = decay * 0.045;
    ctx.fillStyle = rgba(175, 155, 95, yAlpha);
    ctx.fillRect(0, 0, W, H);

    // Cold dead-light shift (weeks 9+)
    if (decay > 0.65) {
        const cAlpha = (decay - 0.65) * 0.03;
        ctx.fillStyle = rgba(140, 150, 175, cAlpha);
        ctx.fillRect(0, 0, W, H);
    }

    // Faint wall stain bottom-left
    if (decay > 0.4) {
        const sa = (decay - 0.4) * 0.04;
        ctx.fillStyle = rgba(130, 120, 100, sa);
        ctx.beginPath();
        ctx.ellipse(150, 400, 45, 30, 0.3, 0, Math.PI * 2);
        ctx.fill();
    }

    // Cobweb strands (weeks 11-12)
    if (decay > 0.85) {
        const ca = (decay - 0.85) * 0.5;
        ctx.strokeStyle = rgba(200, 195, 185, ca * 0.2);
        ctx.lineWidth = 0.3;
        // Top-right corner
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(1120, 90 + i * 12);
            const ex = 1060 + rng() * 30;
            const ey = 140 + rng() * 30 + i * 15;
            ctx.quadraticCurveTo(1100 + rng() * 10, 110 + rng() * 20, ex, ey);
            ctx.stroke();
        }
        // Top-left corner
        for (let i = 0; i < 2; i++) {
            ctx.beginPath();
            ctx.moveTo(80, 90 + i * 10);
            const ex = 120 + rng() * 25;
            const ey = 130 + rng() * 25 + i * 12;
            ctx.quadraticCurveTo(95 + rng() * 10, 105 + rng() * 15, ex, ey);
            ctx.stroke();
        }
    }
}

// ================================================================
//  MAIN RENDER
// ================================================================
let currentWeek = 0;

function render(week) {
    currentWeek = week;
    const rng = roomRng(week);
    const decay = Math.pow(week / 11, 1.35);

    ctx.clearRect(0, 0, W, H);

    // 1. Room shell
    const wall = drawRoomShell(decay);

    // 2. Fluorescent light
    const flickeredOff = drawFluorescentLight(decay, rng);

    // 3. Clock
    drawClock(wall, decay);

    // 4. Whiteboard
    drawWhiteboard(wall, week, decay, rng);

    // 5. Note
    drawNote(decay, rng);

    // 6. Chairs (coat appears only in week 7)
    drawChairs(wall, decay, rng, week === 7);

    // 7. Fly specks
    drawFlySpecks(decay, rng);

    // 8. Dust
    drawDust(decay, rng);

    // 9. Ambient overlay
    drawAmbientDecay(decay, rng);

    // Flicker blackout overlay
    if (flickeredOff) {
        ctx.fillStyle = rgba(20, 20, 18, 0.6);
        ctx.fillRect(0, 0, W, H);
        // Faint emergency glow
        const eg = ctx.createRadialGradient(600, 100, 10, 600, 300, 250);
        eg.addColorStop(0, rgba(255, 240, 200, 0.03));
        eg.addColorStop(1, rgba(0, 0, 0, 0));
        ctx.fillStyle = eg;
        ctx.fillRect(0, 0, W, H);
    }

    // Update UI
    document.getElementById('weekNum').textContent = String(week + 1).padStart(2, '0');
}

// ================================================================
//  INTERACTION
// ================================================================
document.getElementById('prevBtn').addEventListener('click', () => {
    currentWeek = Math.max(0, currentWeek - 1);
    render(currentWeek);
});

document.getElementById('nextBtn').addEventListener('click', () => {
    currentWeek = Math.min(11, currentWeek + 1);
    render(currentWeek);
});

document.getElementById('saveBtn').addEventListener('click', () => {
    render(currentWeek);
    requestAnimationFrame(() => {
        const link = document.createElement('a');
        link.download = `zero-participants-week-${String(currentWeek + 1).padStart(2, '0')}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        currentWeek = Math.min(11, currentWeek + 1);
        render(currentWeek);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        currentWeek = Math.max(0, currentWeek - 1);
        render(currentWeek);
    }
});

// ---- Initial render after fonts load ----
document.fonts.ready.then(() => {
    render(0);
});

// Fallback if fonts API is slow
setTimeout(() => {
    if (currentWeek === 0) render(0);
}, 1500);

</script>
