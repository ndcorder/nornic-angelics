<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Misalignment Museum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <div id="game-header">
      <div id="title-block">
        <h1>THE MISALIGNMENT MUSEUM</h1>
        <div id="subtitle">A Text Adventure in Incremental Displacement</div>
      </div>
      <nav id="controls">
        <button id="notes-btn" class="ctrl-btn" title="Field Notes">Notes</button>
        <button id="help-btn" class="ctrl-btn" title="Help">Help</button>
      </nav>
    </div>

    <div id="output-wrapper">
      <div id="output"></div>
    </div>

    <div id="input-bar">
      <div id="location-name">Entrance Hall</div>
      <form id="input-form" autocomplete="off">
        <span id="prompt-symbol">&gt;</span>
        <input type="text" id="input" placeholder="Type a command..." autofocus spellcheck="false">
      </form>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
