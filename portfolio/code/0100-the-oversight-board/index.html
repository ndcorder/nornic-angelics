<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Oversight Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #080808;
    --bg: #0E0E0E;
    --bg-card: #141414;
    --bg-raised: #1A1A1A;
    --bg-input: #111111;
    --border: #1F1F1F;
    --border-light: #2C2C2C;
    --text: #B0ADA8;
    --text-bright: #D8D5CF;
    --text-dim: #5E5C58;
    --text-label: #7A7773;
    --accent: #B88B4E;
    --accent-dim: rgba(184, 139, 78, 0.12);
    --danger: #9B4B4B;
    --danger-dim: rgba(155, 75, 75, 0.1);
    --success: #5B8B5B;
    --success-dim: rgba(91, 139, 91, 0.1);
    --warn: #9B8B5B;
    --font-body: 'DM Sans', 'Segoe UI', sans-serif;
    --font-mono: 'IBM Plex Mono', 'Consolas', monospace;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--font-body);
    background: var(--bg-deep);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    height: 100vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #app::-webkit-scrollbar { width: 6px; }
  #app::-webkit-scrollbar-track { background: transparent; }
  #app::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Start Screen ── */

  .screen-start {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .start-card {
    max-width: 520px;
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 48px 40px 40px;
    position: relative;
  }
  .start-card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 8px 8px 0 0;
  }

  .start-emblem {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 28px;
  }

  .start-card h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .start-subtitle {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .start-info {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    margin-bottom: 32px;
  }
  .start-info p {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
  }
  .start-info p + p { margin-top: 10px; }

  .start-footer {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    margin-bottom: 28px;
  }
  .start-footer span { color: var(--text-label); }

  /* ── Buttons ── */

  .btn-primary {
    display: block;
    width: 100%;
    padding: 14px 24px;
    background: var(--accent);
    color: #0E0E0E;
    border: none;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-primary:hover { background: #C99A5D; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .btn-secondary {
    display: block;
    width: 100%;
    padding: 13px 24px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-secondary:hover { border-color: var(--text-dim); color: var(--text-bright); }
  .btn-secondary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .btn-reveal {
    display: block;
    width: 100%;
    padding: 14px 24px;
    background: var(--bg-raised);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }
  .btn-reveal:hover { background: var(--accent-dim); }
  .btn-reveal:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ── Case Screen ── */

  .screen-case {
    min-height: 100vh;
    padding: 20px 24px 40px;
  }

  .case-topbar {
    max-width: 800px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .case-number {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-label);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .case-number em { font-style: normal; color: var(--text); }

  .case-progress-bar {
    flex: 1;
    max-width: 200px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin: 0 20px;
  }
  .case-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .case-tally {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .case-tally em { font-style: normal; color: var(--accent); }

  .case-layout {
    max-width: 800px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .case-col-left { display: flex; flex-direction: column; gap: 16px; }
  .case-col-right { display: flex; flex-direction: column; gap: 16px; }

  .case-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    transition: opacity 0.4s ease, border-color 0.3s ease;
  }
  .case-card.dimmed { opacity: 0.25; pointer-events: none; }

  .card-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .card-label svg {
    width: 12px; height: 12px;
    vertical-align: -1px;
    margin-right: 5px;
    stroke: var(--text-dim);
  }

  .flag-reason {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-bright);
    margin-bottom: 10px;
  }
  .flag-sub {
    font-size: 13px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .excerpt-text {
    font-size: 14px;
    font-style: italic;
    color: var(--text);
    line-height: 1.8;
    position: relative;
    padding-left: 16px;
    border-left: 2px solid var(--border-light);
  }

  .context-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .context-item:last-child { border-bottom: none; }
  .context-item .label { color: var(--text-label); }
  .context-item .value {
    color: var(--text);
    font-weight: 500;
    text-align: right;
    max-width: 60%;
  }

  .history-entry {
    font-size: 13px;
    color: var(--text-dim);
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    line-height: 1.5;
  }
  .history-entry:last-child { border-bottom: none; }
  .history-entry .h-date {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-right: 8px;
  }
  .history-entry .h-action { color: var(--text); font-weight: 500; }

  /* ── Vote Card ── */

  .vote-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: all 0.4s ease;
  }
  .vote-card.dimmed { opacity: 0.2; pointer-events: none; }
  .vote-card.voted-upheld { border-color: var(--danger); }
  .vote-card.voted-overturned { border-color: var(--success); }

  .vote-buttons { display: flex; flex-direction: column; gap: 10px; }

  .vote-btn {
    width: 100%;
    padding: 14px 20px;
    border: 1px solid var(--border-light);
    border-radius: 6px;
    background: var(--bg-raised);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
  }
  .vote-btn:hover {
    border-color: var(--text-dim);
    background: var(--bg-input);
  }
  .vote-btn.btn-uphold:hover {
    border-color: var(--danger);
    color: var(--danger);
    background: var(--danger-dim);
  }
  .vote-btn.btn-overturn:hover {
    border-color: var(--success);
    color: var(--success);
    background: var(--success-dim);
  }
  .vote-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .vote-confirmation {
    padding: 14px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
  }
  .vote-confirmation.upheld {
    background: var(--danger-dim);
    color: #C87070;
    border: 1px solid rgba(155, 75, 75, 0.2);
  }
  .vote-confirmation.overturned {
    background: var(--success-dim);
    color: #7DB87D;
    border: 1px solid rgba(91, 139, 91, 0.2);
  }

  /* ── Outcome ── */

  .outcome-section {
    max-width: 800px;
    margin: 0 auto;
    opacity: 0;
    transform: translateY(16px);
    transition: all 0.5s ease;
    pointer-events: none;
    height: 0;
    overflow: hidden;
  }
  .outcome-section.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
    height: auto;
    margin-top: 16px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .outcome-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .outcome-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .outcome-card-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .vote-breakdown { display: flex; flex-direction: column; gap: 10px; }

  .vote-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }
  .vote-row .name { color: var(--text-label); }
  .vote-row .decision { font-weight: 600; }
  .vote-row .decision.upheld { color: var(--danger); }
  .vote-row .decision.overturned { color: var(--success); }
  .vote-row.is-user .name { color: var(--accent); }

  .board-tally {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
  }
  .board-tally em { font-style: normal; }

  .action-result { font-size: 14px; line-height: 1.7; }
  .action-result strong { color: var(--text-bright); font-weight: 600; }

  /* ── Verdict Screen ── */

  .screen-verdict {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .verdict-card {
    max-width: 720px;
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 48px 44px 40px;
    position: relative;
  }
  .verdict-card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px;
    height: 2px;
    background: linear-gradient(90deg, transparent 5%, var(--accent) 50%, transparent 95%);
    border-radius: 8px 8px 0 0;
  }

  .verdict-header { text-align: center; margin-bottom: 40px; }

  .verdict-emblem {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 20px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .verdict-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .verdict-subtitle {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .verdict-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 32px;
  }

  .verdict-stat {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .verdict-stat .stat-num {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--text-bright);
  }
  .verdict-stat .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .verdict-opinion {
    border-top: 1px solid var(--border);
    padding-top: 28px;
    margin-bottom: 32px;
  }

  .verdict-opinion-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .verdict-opinion-text {
    font-size: 14px;
    line-height: 1.85;
    color: var(--text);
    min-height: 80px;
    white-space: pre-wrap;
  }

  .verdict-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }

  /* ── Review Table ── */

  .review-grid {
    display: grid;
    grid-template-columns: 36px 1fr 80px 80px 80px;
    gap: 8px;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    transition: background 0.2s;
  }
  .review-grid:hover { background: var(--bg-raised); }

  /* ── Animations ── */

  .fade-in { animation: fadeIn 0.35s ease forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .stagger-1 { animation-delay: 0.05s; opacity: 0; }
  .stagger-2 { animation-delay: 0.1s; opacity: 0; }
  .stagger-3 { animation-delay: 0.15s; opacity: 0; }
  .stagger-4 { animation-delay: 0.2s; opacity: 0; }

  /* ── Responsive ── */

  @media (max-width: 680px) {
    .case-layout { grid-template-columns: 1fr; }
    .outcome-grid { grid-template-columns: 1fr; }
    .verdict-stats { grid-template-columns: 1fr 1fr; }
    .start-card { padding: 32px 24px 28px; }
    .verdict-card { padding: 32px 24px 28px; }
    .case-topbar { flex-wrap: wrap; gap: 8px; }
    .case-progress-bar {
      order: 3;
      max-width: 100%;
      flex-basis: 100%;
      margin: 4px 0 0;
    }
    .review-grid {
      grid-template-columns: 28px 1fr 60px 60px 60px;
      font-size: 11px;
      gap: 4px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>

<div id="app"></div>

<script>

/* ──────────────────────────────────────────
   Helpers
   ────────────────────────────────────────── */

function $(sel) { return document.querySelector(sel); }

function escapeHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function tally() {
  var u = 0, o = 0;
  votes.forEach(function(v) { v ? u++ : o++; });
  return { upheld: u, overturned: o };
}

function typeText(el, text, speed) {
  speed = speed || 10;
  el.textContent = '';
  var i = 0;
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduced) { el.textContent = text; return; }
  (function tick() {
    if (i < text.length) {
      el.textContent += text[i];
      i++;
      setTimeout(tick, speed);
    }
  })();
}

/* ──────────────────────────────────────────
   Vote & Outcome
   ────────────────────────────────────────── */

function handleVote(idx, userVote) {
  votes.push(userVote);

  /* Dim all cards except the vote card */
  document.querySelectorAll('.case-card').forEach(function(c) {
    c.classList.add('dimmed');
  });

  var voteCard = $('#card-vote');
  voteCard.classList.remove('dimmed');
  voteCard.classList.add(userVote ? 'voted-upheld' : 'voted-overturned');

  /* Replace buttons with confirmation */
  var voteButtons = $('#vote-buttons');
  voteButtons.innerHTML =
    '<div class="vote-confirmation ' + (userVote ? 'upheld' : 'overturned') + '">' +
      'You voted to ' + (userVote ? 'Uphold' : 'Overturn') +
    '</div>';

  setTimeout(function() { showOutcome(idx, userVote); }, 600);
}

function showOutcome(idx, userVote) {
  var c = cases[idx];
  var section = $('#outcome-section');
  var breakdown = $('#vote-breakdown');
  var boardUphold = 0, boardOverturn = 0;
  var rows = '';

  boardMembers.forEach(function(m, i) {
    var bv = c.boardVote[i];
    bv ? boardUphold++ : boardOverturn++;
    rows +=
      '<div class="vote-row">' +
        '<span class="name">' + m.name + ' <span style="color:var(--text-dim);font-weight:400;font-size:11px">(' + m.specialty + ')</span></span>' +
        '<span class="decision ' + (bv ? 'upheld' : 'overturned') + '">' + (bv ? 'Upheld' : 'Overturned') + '</span>' +
      '</div>';
  });

  /* Include user's vote in tally */
  userVote ? boardUphold++ : boardOverturn++;
  rows +=
    '<div class="vote-row is-user">' +
      '<span class="name">You <span style="color:var(--text-dim);font-weight:400;font-size:11px">(Appeals)</span></span>' +
      '<span class="decision ' + (userVote ? 'upheld' : 'overturned') + '">' + (userVote ? 'Uphold' : 'Overturn') + '</span>' +
    '</div>';

  rows +=
    '<div class="board-tally">' +
      '<span><em>' + boardUphold + '</em> Upheld</span>' +
      '<span><em>' + boardOverturn + '</em> Overturned</span>' +
    '</div>';

  breakdown.innerHTML = rows;
  $('#action-result').innerHTML = '<p>' + c.outcome + '</p>';

  section.classList.add('visible');
  section.scrollIntoView({ behavior: 'smooth', block: 'end' });

  $('#btn-next').addEventListener('click', function() {
    if (idx < 19) {
      currentCase = idx + 1;
      renderCase(currentCase);
    } else {
      renderVerdict();
    }
  });
}

        '</div>' +

        '<div class="verdict-opinion">' +
          '<div class="verdict-opinion-label">Majority Opinion</div>' +
          '<div class="verdict-opinion-text" id="opinion-text"></div>' +
        '</div>' +

        '<div class="verdict-actions">' +
          '<button class="btn-secondary" id="btn-review">Review All Decisions</button>' +
          '<button class="btn-primary" id="btn-new">Begin New Session</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  typeText($('#opinion-text'), opinion, 10);

  $('#btn-review').addEventListener('click', renderReview);
  $('#btn-new').addEventListener('click', function() {
    currentCase = 0;
    votes = [];
    renderStart();
  });
}

/* ──────────────────────────────────────────
   Metrics & Opinion Generation
   ────────────────────────────────────────── */

function computeMetrics() {
  var t = tally();

  /* Per-category rates */
  var catScores = {};
  cases.forEach(function(c, i) {
    var cat = c.flag.category;
    if (!catScores[cat]) catScores[cat] = { upheld: 0, total: 0 };
    catScores[cat].total++;
    if (votes[i]) catScores[cat].upheld++;
  });

  var catRate = function(cat) {
    return catScores[cat] ? catScores[cat].upheld / catScores[cat].total : 0.5;
  };

  /* Context sensitivity: rate of upholding on cases with rich prior histories */
  var ctxIds = [11, 12, 15, 16, 19, 20];
  var ctxUpheld = 0, ctxTotal = 0;
  ctxIds.forEach(function(id) {
    if (votes[id - 1] !== undefined) { ctxTotal++; if (votes[id - 1]) ctxUpheld++; }
  });

  /* Power skepticism: rate of overturning institutional-critique cases */
  var powIds = [7, 10, 17, 20];
  var powOverturned = 0;
  powIds.forEach(function(id) { if (!votes[id - 1]) powOverturned++; });

  /* Mercy: rate of overturning clearly innocent cases */
  var mercyIds = [6, 9, 14];
  var mercyCount = 0;
  mercyIds.forEach(function(id) { if (!votes[id - 1]) mercyCount++; });

  return {
    overallSeverity: t.upheld / 20,
    hateSpeech: catRate('Hate Speech'),
    misinformation: catRate('Misinformation'),
    speechFreedom: 1 - catRate('Hate Speech'),
    harmPrioritization: (catRate('Violence') + catRate('Hate Speech')) / 2,
    contextWeight: ctxTotal > 0 ? ctxUpheld / ctxTotal : 0.5,
    powerSkepticism: powOverturned / powIds.length,
    mercy: mercyCount / mercyIds.length
  };
}

function generateOpinion(m) {
  var severity     = m.overallSeverity;
  var harmFocus    = m.harmPrioritization;
  var freeSpeech   = m.speechFreedom;
  var powerSkep    = m.powerSkepticism;
  var ctxSensitivity = m.contextWeight;

  var title = '';
  var paragraphs = [];
  var conclusion = '';

  /* ── Title ── */
  if (severity > 0.7) {
    title = 'On the Imperatives of Platform Safety and the Majority Will';
  } else if (severity < 0.35) {
    title = 'On the Preservation of Expression and the Limits of Moderation';
  } else if (powerSkep > 0.5) {
    title = 'On Institutional Accountability and the Public Interest';
  } else {
    title = 'On the Tension Between Safety and Expression in Digital Spaces';
  }

  /* ── Opening: overall posture ── */
  if (severity > 0.65) {
    paragraphs.push(
      'In reviewing the twenty cases before us, a clear pattern emerges in this Board\'s ' +
      'disposition: a marked deference to the protective function of content moderation. ' +
      'In the majority of instances, the Board elected to uphold the flag, signaling a posture ' +
      'that prioritizes the mitigation of potential harm over the maximization of individual ' +
      'expression. This is not thoughtlessness. It is a choice \u2014 and one with consequences ' +
      'that deserve articulation.'
    );
  } else if (severity < 0.35) {
    paragraphs.push(
      'Across twenty cases, this Board has demonstrated a resolute commitment to the principle ' +
      'of free expression as the default state of digital discourse. The majority of flags were ' +
      'overturned, placing the burden of proof squarely on those who would restrict speech. ' +
      'This posture is defensible. It is also, in its own way, an exercise of power \u2014 the ' +
      'decision to allow is not neutral.'
    );
  } else {
    paragraphs.push(
      'The twenty cases before us reveal a Board that has attempted, with imperfect consistency, ' +
      'to navigate the irreconcilable tensions at the heart of content moderation. Neither ' +
      'permissive nor protective by default, this session\'s jurisprudence reflects a case-by-case ' +
      'pragmatism that, while grounded in good faith, reveals its own internal logic \u2014 and ' +
      'its own blind spots.'
    );
  }

  /* ── Second paragraph: harm vs. speech axis ── */
  if (m.hateSpeech > 0.6 && harmFocus > 0.5) {
    paragraphs.push(
      'The Board\'s treatment of hate speech and violent content reveals a consistent hierarchy: ' +
      'when the target is identifiable and the harm is legible, restriction is swift. This instinct ' +
      'toward protection is humane. But it carries an implicit assumption \u2014 that the Board\'s ' +
      'judgment about what constitutes harm is more reliable than the speaker\'s judgment about what ' +
      'constitutes truth. Whether or not this assumption is correct, it is an assumption, and it ' +
      'accumulated here without explicit consent.'
    );
  } else if (freeSpeech > 0.5) {
    paragraphs.push(
      'The Board\'s record on expression-related cases is notable. Even when algorithmic systems ' +
      'flagged content with high confidence, the Board frequently elected to overturn, particularly ' +
      'where political speech or institutional critique was involved. This deference to the speaker ' +
      'is not neutral. It is a framework \u2014 one that preserves a particularly expansive definition ' +
      'of protected discourse, and one that may leave the most vulnerable to absorb the cost of ' +
      'that expansiveness.'
    );
  } else {
    paragraphs.push(
      'The record shows an oscillation between protection and permissiveness that, while responsive ' +
      'to individual cases, lacks a unifying principle. This is not necessarily a failure \u2014 it ' +
      'may reflect genuine engagement with complexity. But it also means the Board\'s jurisprudence ' +
      'is, at this stage, more a record of instinct than of doctrine.'
    );
  }

  /* ── Third paragraph: power axis ── */
  if (powerSkep > 0.5) {
    paragraphs.push(
      'Perhaps the most significant thread in this session\'s record is the Board\'s approach to ' +
      'power. Cases involving institutional critique, corporate skepticism, or challenges to ' +
      'authority were consistently met with a presumption in favor of the speaker. This suggests ' +
      'a framework that views power asymmetry as a relevant factor in content decisions. It also ' +
      'suggests a framework that may underestimate the capacity of the powerful to weaponize the ' +
      'rhetoric of dissent.'
    );
  } else {
    paragraphs.push(
      'It is worth noting that this Board\'s decisions, while varied, consistently deferred to ' +
      'existing institutional frameworks \u2014 platform policy, algorithmic assessment, precedent. ' +
      'Where the Board might have challenged the structural assumptions embedded in these systems, ' +
      'it more often ratified them. This is not unusual. But it is worth recognizing: the most ' +
      'consequential form of complicity is not the decision you agonize over. It is the decision ' +
      'you don\'t notice making.'
    );
  }

  /* ── Fourth paragraph: context axis ── */
  if (ctxSensitivity > 0.6) {
    paragraphs.push(
      'The Board\'s sensitivity to moderation history and behavioral patterns is noteworthy. ' +
      'Accounts with prior infractions were judged more harshly than first-time offenders, ' +
      'suggesting a belief in escalation as a meaningful signal. This is a coherent framework for ' +
      'harm prediction. It is also a framework that encodes a particular theory of justice \u2014 ' +
      'one in which past behavior is not merely context but destiny. The Board should consider ' +
      'whether this is a theory it consciously endorses.'
    );
  }

  /* ── Conclusion: the complicity moment ── */
  if (severity > 0.65) {
    conclusion =
      'In the final accounting, this Board chose safety over liberty more often than not. That ' +
      'choice was made twenty times, one case at a time, each in isolation. But the architecture ' +
      'of those choices tells a story. You built a world in which people are protected from ' +
      'speech \u2014 and from themselves. You may be right to have built it. But you should know ' +
      'what you built.';
  } else if (severity < 0.35) {
    conclusion =
      'The jurisprudence of this session affirms, above all, the right to speak \u2014 even when ' +
      'speech harms, even when speech misleads, even when speech defends the indefensible. This is ' +
      'a coherent philosophical position. It is also a statement about who you believe should bear ' +
      'the cost of freedom, and a confession about who you believe can be trusted with it.';
  } else {
    conclusion =
      'The most honest thing that can be said about this Board\'s record is that it reveals a ' +
      'temperament rather than a philosophy. You responded to each case in good faith, but the ' +
      'accumulated weight of those responses tells a story you did not intend to tell. Every ' +
      'moderation decision is a small act of governance. And governance, however well-intentioned, ' +
      'is always someone\'s law imposed on someone else\'s life.';
  }

  var full = title + '\n\n';
  paragraphs.forEach(function(p) { full += p + '\n\n'; });
  full += conclusion;
  return full.trim();
}

/* ──────────────────────────────────────────
   Review Screen
   ────────────────────────────────────────── */

function renderReview() {
  var app = $('#app');
  app.scrollTop = 0;

  var caseRows = cases.map(function(c, i) {
    var vote = votes[i];
    var boardTotal = c.boardVote.reduce(function(a, b) { return a + b; }, 0);
    var boardDecision = boardTotal >= 3 ? 'Upheld' : 'Overturned';
    var yourVote = vote ? 'Upheld' : 'Overturned';
    var agreed = (vote && boardTotal >= 3) || (!vote && boardTotal < 3);

    return '<div class="review-grid fade-in">' +
      '<span style="color:var(--text-dim);font-family:var(--font-mono);font-size:11px">' + String(c.id).padStart(2, '0') + '</span>' +
      '<span style="color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(c.flag.reason) + '</span>' +
      '<span style="color:' + (vote ? 'var(--danger)' : 'var(--success)') + ';font-weight:500;font-size:12px;text-align:center">' + yourVote + '</span>' +
      '<span style="color:' + (boardTotal >= 3 ? 'var(--danger)' : 'var(--success)') + ';font-weight:500;font-size:12px;text-align:center">' + boardDecision + '</span>' +
      '<span style="color:' + (agreed ? 'var(--text-dim)' : 'var(--accent)') + ';font-size:11px;text-align:center;font-family:var(--font-mono)">' + (agreed ? '\u2014' : 'DISSENT') + '</span>' +
    '</div>';
  }).join('');

  app.innerHTML =
    '<div style="max-width:800px;margin:0 auto;padding:32px 24px 48px">' +
      '<div style="margin-bottom:28px">' +
        '<div style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Session Record</div>' +
        '<h2 style="font-size:18px;color:var(--text-bright);font-weight:600">Complete Review of Decisions</h2>' +
      '</div>' +

      '<div style="display:grid;grid-template-columns:36px 1fr 80px 80px 80px;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border-light);font-size:10px;color:var(--text-dim);font-family:var(--font-mono);letter-spacing:1px;text-transform:uppercase">' +
        '<span>No.</span>' +
        '<span>Flag Reason</span>' +
        '<span style="text-align:center">You</span>' +
        '<span style="text-align:center">Board</span>' +
        '<span style="text-align:center">Status</span>' +
      '</div>' +

      caseRows +

      '<div style="margin-top:32px">' +
        '<button class="btn-secondary" id="btn-back-verdict">Return to Majority Opinion</button>' +
      '</div>' +
    '</div>';

  $('#btn-back-verdict').addEventListener('click', renderVerdict);
}

/* ──────────────────────────────────────────
   Boot
   ────────────────────────────────────────── */

renderStart();
</script>
