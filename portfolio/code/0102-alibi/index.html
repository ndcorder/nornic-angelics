<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alibi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0e;
  --surface: #131420;
  --surface-hi: #1a1b2c;
  --border: #242640;
  --border-hi: #343658;
  --text: #d4d4d8;
  --text-lo: #888894;
  --text-dim: #4e4e58;
  --amber: #d4a853;
  --amber-lo: #b08a38;
  --red: #b83a3a;
  --red-lo: #7a2828;
  --red-dim: #2a1010;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'IBM Plex Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-weight: 300;
  line-height: 1.7;
  font-size: 13px;
}

::selection { background: var(--red-dim); color: var(--text); }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(184,58,58,0.03) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(212,168,83,0.02) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.dossier-wrap {
  max-width: 740px;
  margin: 0 auto;
  padding: 40px 24px 100px;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

#screen { position: relative; }

#screen::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 999;
  opacity: 0.4;
}

/* ---- INTRO ---- */

.intro-title {
  font-family: 'Crimson Pro', serif;
  font-size: 52px;
  font-weight: 700;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
  opacity: 0;
  animation: introFade 1.2s ease 0.3s forwards;
}

.intro-sub {
  font-size: 10px;
  color: var(--text-dim);
  text-align: center;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 70px;
  opacity: 0;
  animation: introFade 1.2s ease 0.6s forwards;
}

.intro-body {
  max-width: 500px;
  margin: 0 auto 60px;
  text-align: center;
  color: var(--text-lo);
  font-size: 13px;
  line-height: 2.1;
  opacity: 0;
  animation: introFade 1s ease 0.9s forwards;
}

.intro-body strong {
  color: var(--amber-lo);
  font-weight: 400;
}

.intro-body em {
  color: var(--amber);
  font-style: italic;
  font-family: 'Crimson Pro', serif;
  font-size: 14px;
}

@keyframes introFade {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.begin-btn {
  display: block;
  margin: 0 auto;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-lo);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 14px 52px;
  cursor: pointer;
  transition: all 0.5s ease;
  text-transform: uppercase;
  opacity: 0;
  animation: introFade 1s ease 1.2s forwards;
}

.begin-btn:hover {
  border-color: var(--amber-lo);
  color: var(--amber);
  box-shadow: 0 0 40px rgba(212,168,83,0.05);
}

.begin-btn:focus-visible {
  outline: 2px solid var(--amber-lo);
  outline-offset: 4px;
}

.begin-btn.secondary {
  margin-top: 16px;
  border-color: var(--border);
  color: var(--text-dim);
  animation-delay: 1.4s;
}

.begin-btn.secondary:hover {
  border-color: var(--text-dim);
  color: var(--text-lo);
}

/* ---- DOSSIER HEADER ---- */

.dossier-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 8px;
  flex-wrap: wrap;
  opacity: 0;
  animation: slideIn 0.6s ease forwards;
}

.dossier-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.dossier-name {
  font-family: 'Crimson Pro', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
}

.dossier-meta {
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.9;
  margin-bottom: 40px;
  opacity: 0;
  animation: slideIn 0.6s ease 0.15s forwards;
}

.dossier-meta span { color: var(--text-lo); }

/* ---- TIMELINE ---- */

.timeline {
  position: relative;
  padding-left: 108px;
  margin-bottom: 48px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 96px;
  top: 0;
  bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--border) 20px, var(--border) calc(100% - 20px), transparent);
}

.t-entry {
  position: relative;
  margin-bottom: 6px;
  padding: 12px 16px;
  border-radius: 4px;
  border-left: 3px solid transparent;
  transition: all 0.3s ease;
  cursor: pointer;
  opacity: 0;
  animation: entrySlide 0.4s ease forwards;
}

.t-entry:nth-child(1)  { animation-delay: 0.05s; }
.t-entry:nth-child(2)  { animation-delay: 0.08s; }
.t-entry:nth-child(3)  { animation-delay: 0.11s; }
.t-entry:nth-child(4)  { animation-delay: 0.14s; }
.t-entry:nth-child(5)  { animation-delay: 0.17s; }
.t-entry:nth-child(6)  { animation-delay: 0.20s; }
.t-entry:nth-child(7)  { animation-delay: 0.23s; }
.t-entry:nth-child(8)  { animation-delay: 0.26s; }
.t-entry:nth-child(9)  { animation-delay: 0.29s; }
.t-entry:nth-child(10) { animation-delay: 0.32s; }
.t-entry:nth-child(n+11) { animation-delay: 0.35s; }

@keyframes entrySlide {
  from { opacity: 0; transform: translateX(-4px); }
  to { opacity: 1; transform: translateX(0); }
}

.t-entry::before {
  content: '';
  position: absolute;
  left: -23px;
  top: 50%;
  transform: translateY(-50%);
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.3s ease;
}

.t-entry:hover {
  background: var(--surface);
  border-left-color: var(--border-hi);
}

.t-entry:hover::before {
  background: var(--text-dim);
}

.t-time {
  position: absolute;
  left: -108px;
  top: 12px;
  font-size: 11px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  width: 80px;
  text-align: right;
}

.t-activity {
  font-size: 13px;
  color: var(--text-lo);
  margin-bottom: 2px;
}

.t-detail {
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.5;
}

/* Vulnerable entries — faint amber left-border */
.t-entry.vulnerable {
  border-left-color: rgba(212,168,83,0.08);
}

.t-entry.vulnerable::before {
  background: var(--amber-lo);
  opacity: 0.35;
}

.t-entry.vulnerable:hover {
  border-left-color: rgba(212,168,83,0.2);
}

/* Selected gap entry */
.t-entry.selected {
  border-left-color: var(--red) !important;
  background: var(--red-dim) !important;
  cursor: default;
}

.t-entry.selected::before {
  background: var(--red) !important;
  opacity: 1 !important;
  box-shadow: 0 0 8px rgba(184,58,58,0.4);
}

.t-entry.selected .t-activity { color: var(--text); }
.t-entry.selected .t-detail   { color: var(--text-lo); }

/* Entries adjacent to the gap */
.t-entry.gap-adjacent {
  background: rgba(184,58,58,0.03);
  border-left-color: rgba(184,58,58,0.2);
  cursor: default;
}

/* Locked entries after selection */
.t-entry.locked {
  cursor: default;
  opacity: 0.6;
}

.t-entry.locked:hover {
  background: transparent;
  border-left-color: transparent;
}

.t-entry.locked:hover::before {
  background: var(--border);
  opacity: 1;
}

/* ---- GAP SECTION ---- */

.gap-section {
  margin-bottom: 48px;
  opacity: 0;
  animation: slideIn 0.6s ease 0.8s forwards;
}

.gap-instruction {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  margin-bottom: 24px;
  line-height: 2;
}

.gap-instruction strong {
  color: var(--amber-lo);
  font-weight: 400;
}

.gap-marker {
  text-align: center;
  margin: 20px 0;
  padding: 14px;
  background: var(--red-dim);
  border: 1px solid rgba(184,58,58,0.2);
  border-radius: 4px;
  font-size: 12px;
  color: var(--red);
  letter-spacing: 2px;
  display: none;
}

.gap-marker.visible { display: block; }

.confirm-btn {
  display: block;
  margin: 28px auto 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 14px 44px;
  cursor: pointer;
  transition: all 0.5s ease;
  text-transform: uppercase;
}

.confirm-btn:hover:not(:disabled) {
  border-color: var(--red-lo);
  color: var(--red);
  box-shadow: 0 0 30px rgba(184,58,58,0.06);
  text-shadow: 0 0 12px rgba(184,58,58,0.3);
}

.confirm-btn:focus-visible {
  outline: 2px solid var(--red-lo);
  outline-offset: 4px;
}

.confirm-btn:disabled {
  opacity: 0.2;
  cursor: not-allowed;
}

/* ---- AFTERMATH ---- */

.aft-header {
  margin-bottom: 32px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.aft-title {
  font-family: 'Crimson Pro', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}

.aft-meta {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.aft-section {
  margin-bottom: 32px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}

.aft-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.aft-label {
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--amber-lo);
  margin-bottom: 10px;
}

.aft-text {
  font-size: 13px;
  color: var(--text-lo);
  line-height: 2;
}

.aft-text strong {
  color: var(--text);
  font-weight: 400;
}

.aft-text em {
  color: var(--text-dim);
  font-style: italic;
}

.aft-question {
  border-top: 1px solid var(--border);
  padding-top: 28px;
  margin-top: 40px;
}

.aft-question-text {
  font-family: 'Crimson Pro', serif;
  font-size: 16px;
  color: var(--text);
  line-height: 1.9;
  font-style: italic;
}

.continue-btn {
  display: block;
  margin: 48px auto 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 13px 40px;
  cursor: pointer;
  transition: all 0.5s ease;
  text-transform: uppercase;
}

.continue-btn:hover {
  border-color: var(--text-dim);
  color: var(--text-lo);
}

.continue-btn:focus-visible {
  outline: 2px solid var(--text-dim);
  outline-offset: 4px;
}

/* ---- MIRROR ---- */

.mirror-wrap {
  padding-top: 4vh;
}

.mirror-title {
  font-family: 'Crimson Pro', serif;
  font-size: 30px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 48px;
  text-align: center;
  letter-spacing: 2px;
}

.mirror-record {
  margin-bottom: 24px;
  padding: 20px;
  background: var(--surface);
  border-radius: 4px;
  border-left: 3px solid var(--border);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.mirror-record.visible {
  opacity: 1;
  transform: translateY(0);
}

.mirror-record-num {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.mirror-record-detail {
  font-size: 12px;
  color: var(--text-lo);
  line-height: 1.8;
}

.mirror-record-detail em {
  color: var(--text-dim);
}

.mirror-record-detail .hl {
  color: var(--amber);
}

.mirror-record-detail .hl-red {
  color: var(--red);
}

.mirror-divider {
  width: 50px;
  height: 1px;
  background: var(--border);
  margin: 44px auto;
}

.mirror-analysis {
  text-align: center;
  margin-bottom: 36px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.mirror-analysis.visible {
  opacity: 1;
  transform: translateY(0);
}

.mirror-analysis p {
  font-size: 13px;
  color: var(--text-lo);
  line-height: 2.1;
  margin-bottom: 14px;
}

.mirror-analysis em {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  color: var(--amber);
  font-size: 15px;
}

.mirror-reveal {
  font-family: 'Crimson Pro', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-top: 28px;
  line-height: 1.6;
  text-align: left;
  padding: 0 20px;
}

.mirror-avoid {
  font-family: 'Crimson Pro', serif;
  font-size: 15px;
  color: var(--text-lo);
  margin-top: 28px;
  line-height: 1.7;
  text-align: left;
  padding: 0 20px;
  font-style: italic;
}

.mirror-final {
  margin-top: 56px;
  padding-top: 36px;
  border-top: 1px solid var(--border);
  text-align: center;
  opacity: 0;
  transition: opacity 1s ease;
}

.mirror-final.visible { opacity: 1; }

.mirror-final p {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 2.2;
  margin-bottom: 10px;
}

.mirror-final em {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  color: var(--text-lo);
  font-size: 14px;
}

.erase-btn {
  display: block;
  margin: 36px auto 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 13px 40px;
  cursor: pointer;
  transition: all 0.5s ease;
  text-transform: uppercase;
}

.erase-btn:hover {
  border-color: var(--red-lo);
  color: var(--red);
}

.erase-btn:focus-visible {
  outline: 2px solid var(--red-lo);
  outline-offset: 4px;
}

/* ---- UTILITY ---- */

.sep {
  width: 100%;
  height: 1px;
  background: var(--border);
  margin: 40px 0;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
  }
  .aft-section      { opacity: 1; transform: none; }
  .mirror-record    { opacity: 1; transform: none; }
  .mirror-analysis  { opacity: 1; transform: none; }
  .mirror-final     { opacity: 1; }
  .intro-title, .intro-sub, .intro-body, .begin-btn { opacity: 1; }
  .t-entry          { opacity: 1; }
  .dossier-header, .dossier-meta, .gap-section { opacity: 1; }
}

@media (max-width: 640px) {
  .dossier-wrap { padding: 24px 16px 60px; }
  .intro-title  { font-size: 38px; letter-spacing: 5px; }
  .timeline     { padding-left: 68px; }
  .t-time       { left: -68px; width: 48px; font-size: 10px; }
  .timeline::before { left: 58px; }
  .t-entry      { padding: 10px 12px; }
  .dossier-header { flex-direction: column; gap: 4px; }
  .mirror-reveal, .mirror-avoid { padding: 0; }
}
</style>
</head>

/* ----------------------------------------------------------
   PATTERN ANALYSIS
 ---------------------------------------------------------- */

function analyzePatterns(history) {
  if (!history || history.length < 2) return null;

  var n = history.length;

  /* Vulnerability preference */
  var vulnCount = history.filter(function(h) { return h.vulnerable; }).length;
  var vulnRatio = vulnCount / n;

  /* Time distribution */
  var timeSlots = { dawn: 0, morning: 0, midday: 0, afternoon: 0, evening: 0, night: 0 };
  var timeLabels = {
    dawn: 'the early hours (before 7)',
    morning: 'the morning (7\u201311)',
    midday: 'midday (11\u201314)',
    afternoon: 'the afternoon (14\u201317)',
    evening: 'the evening (17\u201321)',
    night: 'the night (after 21)'
  };

  for (var i = 0; i < n; i++) {
    var hour = parseInt(history[i].gapTime.split(':')[0], 10);
    if (hour < 7) timeSlots.dawn++;
    else if (hour < 11) timeSlots.morning++;
    else if (hour < 14) timeSlots.midday++;
    else if (hour < 17) timeSlots.afternoon++;
    else if (hour < 21) timeSlots.evening++;
    else timeSlots.night++;
  }

  var sorted = Object.entries(timeSlots).filter(function(e) { return e[1] > 0; }).sort(function(a, b) { return b[1] - a[1]; });
  var primaryTimeSlot = sorted[0] ? sorted[0][0] : 'morning';
  var timeLabel = timeLabels[primaryTimeSlot];

  /* Isolation preference */
  var aloneCount = history.filter(function(h) { return h.isolation === 'alone'; }).length;
  var prefersAlone = aloneCount > n / 2;

  /* Activity frequency */
  var actCounts = {};
  for (var j = 0; j < n; j++) {
    if (history[j].activityVerb) {
      actCounts[history[j].activityVerb] = (actCounts[history[j].activityVerb] || 0) + 1;
    }
  }
  var topAct = Object.entries(actCounts).sort(function(a, b) { return b[1] - a[1]; })[0];
  var topActivity = topAct ? topAct[0] : null;

  /* Archetype frequency */
  var typeCounts = {};
  for (var k = 0; k < n; k++) {
    typeCounts[history[k].archetypeType] = (typeCounts[history[k].archetypeType] || 0) + 1;
  }
  var topType = Object.entries(typeCounts).sort(function(a, b) { return b[1] - a[1]; })[0];
  var topArchetype = topType ? topType[0] : null;

  /* Build natural language */
  var archetypeLabels = {
    commuter: 'the working parent, split between obligation and home',
    parent: 'the homebound caregiver, surrounded by the domestic',
    'gym-goer': 'the young professional, always in motion, always documented',
    retiree: 'the settled elder, decades into the same gentle routine'
  };

  var activityLabels = {
    resting: 'stillness \u2014 sleep, rest, the pause between actions',
    eating: 'meals \u2014 the ritual of nourishment and routine',
    transit: 'transit \u2014 the space between destinations',
    working: 'work \u2014 the productive gap, attention turned inward',
    reading: 'reading \u2014 absorbed elsewhere, present in body only',
    watching: 'watching \u2014 the passive reception, guard lowered',
    hygiene: 'the bathroom \u2014 the most private space',
    sleeping: 'sleep \u2014 total vulnerability, the body undefended',
    communicating: 'communication \u2014 the thread connecting subject to others',
    tending: 'tending \u2014 to garden, to home, to the small maintenances of living',
    creating: 'creation \u2014 cooking, building, making something from nothing',
    socializing: 'socializing \u2014 the subject visible to others but not truly seen',
    preparing: 'preparation \u2014 the moment before, attention fragmented',
    exertion: 'physical exertion \u2014 the body focused, the mind elsewhere',
    thinking: 'thinking \u2014 the interior turn, chess and books and the ceiling crack',
    transitioning: 'transitions \u2014 the liminal spaces between activities'
  };

  var vulnPhrase = vulnRatio > 0.5
    ? 'You are drawn to moments the analysts flagged as vulnerable \u2014 the thin places in the timeline where the subject\'s guard is lowest.'
    : 'You avoid the flagged vulnerabilities. You choose moments of apparent stability \u2014 as if the safety itself is the opening you need.';

  var isoPhrase = prefersAlone
    ? 'You prefer your subjects alone. Solitude is your canvas \u2014 the absence of witnesses is not a consequence but a condition of your selection.'
    : 'You choose moments of proximity \u2014 when the subject is near others but not fully engaged. The social veil provides cover; the crowd becomes camouflage.';

  var timePhrase = 'Your selections cluster in ' + timeLabel + '. This is when you are most active as an author, when your attention sharpens.';

  var actPhrase = (topActivity && activityLabels[topActivity])
    ? 'More specifically: you keep selecting ' + activityLabels[topActivity] + '.'
    : '';

  var archPhrase = (topArchetype && archetypeLabels[topArchetype])
    ? 'Your preferred subject is ' + archetypeLabels[topArchetype] + '. You return to this life, this pattern, this kind of ordinary day.'
    : '';

  var summary = [vulnPhrase, isoPhrase, timePhrase, actPhrase, archPhrase].filter(Boolean).join(' ');

  /* What they avoid */
  var avoidVuln = vulnRatio > 0.5
    ? 'genuine stability \u2014 moments when the subject is anchored, verified, held in place by routine and witness'
    : 'true vulnerability \u2014 the raw moments the analysts flagged, the times when the subject is most exposed';

  var avoidIso = prefersAlone
    ? 'social density \u2014 the times when witnesses are plentiful, when the subject is seen and confirmed'
    : 'true solitude \u2014 the gaps where no one could intervene, where the subject is most alone';

  var unusedSlots = Object.entries(timeSlots).filter(function(e) { return e[1] === 0; });
  var avoidTime = unusedSlots.length > 0
    ? timeLabels[unusedSlots[unusedSlots.length - 1][0]]
    : 'the hours you never touch';

  var avoidSummary = 'What you avoid: ' + avoidVuln + '. ' + avoidIso + '. ' + avoidTime + ' \u2014 the gaps you leave untouched are as revealing as the ones you mark. The pattern of your refusals is legible.';

  return {
    summary: summary,
    avoidSummary: avoidSummary,
    prefersAlone: prefersAlone,
    prefersVulnerable: vulnRatio > 0.5,
    primaryTimeSlot: primaryTimeSlot,
    topActivity: topActivity,
    topArchetype: topArchetype
  };
}

/* ----------------------------------------------------------
   AFTERMATH GENERATION
 ---------------------------------------------------------- */

function generateAftermath(archetype, gapIndex) {
  var entry = archetype.entries[gapIndex];
  var aft = archetype.aftermath;
  var act = entry.activity.toLowerCase();

  /* Context detection */
  var contextKey = 'alone';
  if (act.includes('walk') || act.includes('drive') || act.includes('metro') || act.includes('badge') || act.includes('files at')) {
    contextKey = 'inTransit';
  } else if (act.includes('read') || act.includes('journal') || act.includes('chess')) {
    contextKey = 'reading';
  } else if (act.includes('cook') || act.includes('prep') || act.includes('dinner') || act.includes('lunch') || act.includes('breakfast') || act.includes('chops') || act.includes('sauce') || act.includes('dishes') || act.includes('washes')) {
    contextKey = 'domestic';
  } else if (act.includes('gym') || act.includes('weight') || act.includes('treadmill') || act.includes('circuit') || act.includes('stretch') || act.includes('workshop') || act.includes('birdhouse')) {
    contextKey = 'atGym';
  } else if (act.includes('nap') || act.includes('sleep') || act.includes('lights out') || act.includes('bed') || act.includes('wakes')) {
    contextKey = 'alone';
  } else if (act.includes('tv') || act.includes('watch') || act.includes('sits')) {
    contextKey = 'evening';
  } else if (act.includes('garden') || act.includes('porch')) {
    contextKey = 'garden';
  } else if (act.includes('work') || act.includes('desk') || act.includes('meeting') || act.includes('email') || act.includes('call') || act.includes('laptop')) {
    contextKey = 'working';
  }

  var contextMap = aft.gapContexts;
  var contextDesc = contextMap[contextKey] || contextMap.alone || 'between moments \u2014 the space the timeline doesn\'t watch';

  /* Rotate through forensic/neighbor/theory by gap index */
  var forensic = aft.forensic[gapIndex % aft.forensic.length];
  var neighbor = aft.neighbor[gapIndex % aft.neighbor.length];
  var theory  = aft.theory[gapIndex % aft.theory.length];

  /* Question keyed to session count */
  var qIndex = Math.min(state.history.length, aft.questions.length - 1);
  var question = aft.questions[qIndex].replace(/\{context\}/g, contextDesc.toLowerCase());

  /* Pattern hint for returning players */
  if (state.history.length >= 2) {
    var pattern = analyzePatterns(state.history);
    var hint = pattern
      ? (pattern.prefersAlone ? 'solitude' : 'proximity')
      : 'this kind of moment';
    question = question.replace(/\{patternHint\}/g, hint);
  } else {
    question = question.replace(/\{patternHint\}/g, 'this kind of moment');
  }

  /* Disruption level */
  var isVuln = entry.vulnerable;
  var disruption = 'minimal';
  if (isVuln) {
    disruption = 'total';
  } else {
    var nearbyVuln = [];
    for (var vi = Math.max(0, gapIndex - 2); vi <= Math.min(archetype.entries.length - 1, gapIndex + 2); vi++) {
      if (archetype.entries[vi].vulnerable) nearbyVuln.push(vi);
    }
    if (nearbyVuln.length > 0) disruption = 'partial';
  }

  /* Isolation heuristic */
  var det = entry.detail.toLowerCase();
  var isAlone = det.includes('alone') || det.includes('quiet') || det.includes('silent') ||
    act.includes('read') || act.includes('nap') || act.includes('sleep') ||
    act.includes('workshop') || act.includes('journal') || act.includes('chess');

  return {
    disruption: disruption,
    contextDesc: contextDesc,
    forensic: forensic,
    neighbor: neighbor,
    theory: theory,
    question: question,
    isAlone: isAlone
  };
}

/* ----------------------------------------------------------
   VERB EXTRACTION
 ---------------------------------------------------------- */

function extractVerb(activity) {
  var a = activity.toLowerCase();
  var map = [
    ['alarm', 'resting'], ['shower', 'hygiene'], ['coffee', 'preparing'],
    ['breakfast', 'eating'], ['drives', 'transit'], ['drive', 'transit'],
    ['walk', 'transit'], ['metro', 'transit'], ['work', 'working'],
    ['desk', 'working'], ['lunch', 'eating'], ['dinner', 'eating'],
    ['read', 'reading'], ['reads', 'reading'], ['tv', 'watching'],
    ['watches', 'watching'], ['gym', 'exertion'], ['nap', 'sleeping'],
    ['sleep', 'sleeping'], ['call', 'communicating'], ['phone', 'communicating'],
    ['garden', 'tending'], ['cook', 'creating'], ['chess', 'thinking'],
    ['prep', 'preparing'], ['shop', 'preparing'], ['playdate', 'socializing'],
    ['journal', 'thinking'], ['workshop', 'creating'], ['birdhouse', 'creating'],
    ['dishes', 'domestic'], ['bath', 'hygiene'], ['locks', 'securing'],
    ['bag', 'preparing'], ['packing', 'preparing']
  ];
  for (var i = 0; i < map.length; i++) {
    if (a.includes(map[i][0])) return map[i][1];
  }
  return 'transitioning';
}

function beginDossier() {
  var available = ARCHETYPES.slice();
  if (state.history.length > 0) {
    var last = state.history[state.history.length - 1].archetypeType;
    var filtered = available.filter(function(a) { return a.type !== last; });
    if (filtered.length > 0) available = filtered;
  }
  state.currentArchetype = available[Math.floor(Math.random() * available.length)];
  state.currentGapIndex = -1;
  state.screen = 'dossier';
  renderDossier();
}

function renderDossier() {
  var a = state.currentArchetype;
  var $s = document.getElementById('screen');

  var entriesHtml = '';
  for (var i = 0; i < a.entries.length; i++) {
    var e = a.entries[i];
    entriesHtml += '<div class="t-entry ' + (e.vulnerable ? 'vulnerable' : '') +
      '" id="entry-' + i + '" data-idx="' + i + '">' +
      '<span class="t-time">' + e.time + '</span>' +
      '<div class="t-activity">' + e.activity + '</div>' +
      '<div class="t-detail">' + e.detail + '</div>' +
      '</div>';
  }

  $s.innerHTML =
    '<div class="dossier-header">' +
      '<span class="dossier-label">Dossier ' + (state.history.length + 1) + '</span>' +
      '<span class="dossier-name">' + a.name + '</span>' +
    '</div>' +
    '<div class="dossier-meta">' +
      'Age ' + a.age + ' &middot; ' + a.occupation + ' &middot; ' + a.location + '<br>' +
      'Relation: <span>' + a.relation + '</span><br>' +
      'Normality Index: <span>' + a.summary.normality + '</span><br>' +
      'Known Associates: <span>' + a.summary.associates + '</span><br>' +
      'Analyst Notes: <span>' + a.summary.notes + '</span>' +
    '</div>' +
    '<div class="timeline" id="timeline">' + entriesHtml + '</div>' +
    '<div class="gap-section">' +
      '<div class="gap-instruction">' +
        'Select the <strong>8-minute gap</strong> where the event occurs.<br>' +
        'Click a timeline entry to mark it. The timeline will not change. ' +
        '<span style="color: var(--text-dim);">This cannot be undone.</span>' +
      '</div>' +
      '<div class="gap-marker" id="gap-marker"></div>' +
      '<button class="confirm-btn" id="confirm-btn" disabled onclick="confirmSelection()">' +
        'Authorize Event' +
      '</button>' +
    '</div>';

  var entries = document.querySelectorAll('.t-entry');
  for (var j = 0; j < entries.length; j++) {
    entries[j].addEventListener('click', function() {
      selectGap(parseInt(this.dataset.idx, 10));
    });
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectGap(idx) {
  if (state.currentGapIndex >= 0) return;
  state.currentGapIndex = idx;

  var entry = state.currentArchetype.entries[idx];

  var entries = document.querySelectorAll('.t-entry');
  for (var i = 0; i < entries.length; i++) {
    if (i === idx) {
      entries[i].classList.add('selected');
    } else if (Math.abs(i - idx) <= 1) {
      entries[i].classList.add('gap-adjacent');
    } else {
      entries[i].classList.add('locked');
    }
  }

  var marker = document.getElementById('gap-marker');
  marker.classList.add('visible');
  marker.textContent = 'EVENT WINDOW: ' + entry.time + ' \u2014 +8 MIN';

  document.getElementById('confirm-btn').disabled = false;
}

function confirmSelection() {
  if (state.currentGapIndex < 0) return;

  var a = state.currentArchetype;
  var gapIdx = state.currentGapIndex;
  var entry = a.entries[gapIdx];

  var det = entry.detail.toLowerCase();
  var act = entry.activity.toLowerCase();

  var record = {
    archetypeType: a.type,
    archetypeName: a.name,
    gapTime: entry.time,
    gapActivity: entry.activity,
    vulnerable: entry.vulnerable,
    isolation: (det.includes('alone') || act.includes('read') ||
      act.includes('nap') || act.includes('workshop') ||
      act.includes('journal') || act.includes('chess'))
      ? 'alone' : 'social',
    activityVerb: extractVerb(entry.activity),
    timestamp: Date.now()
  };

  /* Generate aftermath BEFORE recording */
  state.currentAftermath = generateAftermath(a, gapIdx);

  state.history.push(record);
  saveHistory();

  state.screen = 'aftermath';
  renderAftermath();
}

/* ----------------------------------------------------------
   RENDER: AFTERMATH
 ---------------------------------------------------------- */

function renderAftermath() {
  var a = state.currentArchetype;
  var aft = state.currentAftermath;
  var entry = a.entries[state.currentGapIndex];
  var $s = document.getElementById('screen');

  $s.innerHTML =
    '<div class="aft-header">' +
      '<div class="aft-title">Forensic Aftermath</div>' +
      '<div class="aft-meta">' +
        a.name.toUpperCase() + ' &middot; EVENT WINDOW ' + entry.time + '\u2013+8 MIN' +
        ' &middot; DISRUPTION: ' + aft.disruption.toUpperCase() +
      '</div>' +
    '</div>' +

    '<div class="aft-section" id="aft-1">' +
      '<div class="aft-label">Investigation Reveals</div>' +
      '<div class="aft-text">' + aft.forensic + '</div>' +
    '</div>' +

    '<div class="aft-section" id="aft-2">' +
      '<div class="aft-label">Neighbors Heard</div>' +
      '<div class="aft-text">' + aft.neighbor + '</div>' +
    '</div>' +

    '<div class="aft-section" id="aft-3">' +
      '<div class="aft-label">Timeline Proves</div>' +
      '<div class="aft-text">' + aft.theory + '</div>' +
    '</div>' +

    '<div class="sep"></div>' +

    '<div class="aft-section" id="aft-4">' +
      '<div class="aft-label" style="color: var(--amber-lo);">Directed to You</div>' +
      '<div class="aft-question-text">' + aft.question + '</div>' +
    '</div>' +

    '<button class="continue-btn" onclick="nextAfterSelection()">' +
      (state.history.length < 3 ? 'Next Dossier' : 'View Pattern Report') +
    '</button>';

  var ids = ['aft-1', 'aft-2', 'aft-3', 'aft-4'];
  for (var i = 0; i < ids.length; i++) {
    (function(id, delay) {
      setTimeout(function() {
        var el = document.getElementById(id);
        if (el) el.classList.add('visible');
      }, delay);
    })(ids[i], 500 + i * 700);
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextAfterSelection() {
  if (state.history.length >= 3) {
    showMirror();
  } else {
    state.screen = 'intro';
    renderIntro();
  }
}

/* ----------------------------------------------------------
   RENDER: MIRROR
 ---------------------------------------------------------- */

function showMirror() {
  state.screen = 'mirror';
  var pattern = analyzePatterns(state.history);
  if (!pattern) { renderIntro(); return; }

  var $s = document.getElementById('screen');

  var recordsHtml = '';
  for (var i = 0; i < state.history.length; i++) {
    var h = state.history[i];
    recordsHtml +=
      '<div class="mirror-record" id="mr-' + i + '">' +
        '<div class="mirror-record-num">Dossier ' + (i + 1) + '</div>' +
        '<div class="mirror-record-detail">' +
          '<strong>' + h.archetypeName + '</strong> &middot; Gap at <span class="hl">' + h.gapTime + '</span><br>' +
          '<em>' + h.gapActivity + '</em><br>' +
          'Flagged vulnerable: <span class="' + (h.vulnerable ? 'hl-red' : '') + '">' +
            (h.vulnerable ? 'Yes' : 'No') + '</span>' +
          ' &middot; Isolation: <span class="hl">' + h.isolation + '</span>' +
          ' &middot; Category: ' + h.activityVerb +
        '</div>' +
      '</div>';
  }

  $s.innerHTML =
    '<div class="mirror-wrap">' +
      '<div class="mirror-title">Pattern Report</div>' +
      recordsHtml +
      '<div class="mirror-divider"></div>' +
      '<div class="mirror-analysis" id="mirror-intro">' +
        '<p>Across ' + state.history.length + ' selections, a pattern has emerged.</p>' +
      '</div>' +
      '<div class="mirror-analysis" id="mirror-reveal-block">' +
        '<div class="mirror-reveal">' + pattern.summary + '</div>' +
      '</div>' +
      '<div class="mirror-divider"></div>' +
      '<div class="mirror-analysis" id="mirror-avoid-block">' +
        '<div class="mirror-avoid">' + pattern.avoidSummary + '</div>' +
      '</div>' +
      '<div class="mirror-divider"></div>' +
      '<div class="mirror-final" id="mirror-final">' +
        '<p>You have authorized ' + state.history.length + ' event' + (state.history.length !== 1 ? 's' : '') + '.</p>' +
        '<p>Each one was your choice. No one made you select those specific gaps.</p>' +
        '<p>The subjects were your neighbors. The timeline was their life.</p>' +
        '<p><em>The pattern was always you.</em></p>' +
      '</div>' +
      '<button class="erase-btn" onclick="eraseAndReset()">Erase Records</button>' +
    '</div>';

  /* Stagger record reveal */
  for (var ri = 0; ri < state.history.length; ri++) {
    (function(idx) {
      setTimeout(function() {
        var el = document.getElementById('mr-' + idx);
        if (el) el.classList.add('visible');
      }, 300 + idx * 300);
    })(ri);
  }

  var base = 300 + state.history.length * 300;

  setTimeout(function() {
    var el = document.getElementById('mirror-intro');
    if (el) el.classList.add('visible');
  }, base + 400);

  setTimeout(function() {
    var el = document.getElementById('mirror-reveal-block');
    if (el) el.classList.add('visible');
  }, base + 1200);

  setTimeout(function() {
    var el = document.getElementById('mirror-avoid-block');
    if (el) el.classList.add('visible');
  }, base + 2000);

  setTimeout(function() {
    var el = document.getElementById('mirror-final');
    if (el) el.classList.add('visible');
  }, base + 3000);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function eraseAndReset() {
  state.history = [];
  state.currentArchetype = null;
  state.currentGapIndex = -1;
  state.currentAftermath = null;
  state.screen = 'intro';
  saveHistory();
  renderIntro();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ----------------------------------------------------------
   INIT
 ---------------------------------------------------------- */

function init() {
  loadHistory();
  var params = new URLSearchParams(window.location.search);
  if (params.get('reset') === 'true') {
    state.history = [];
    saveHistory();
    var url = new URL(window.location);
    url.searchParams.delete('reset');
    window.history.replaceState({}, '', url);
  }
  renderIntro();
}

init();
</script>
</body>
</html>
