<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reunion</title>
</head>
<body>
  <div id="app">
    <div id="status-bar">
      <div id="status-left">
        <div id="status-dot" class="online"></div>
        <span id="status-name">June</span>
      </div>
      <span id="status-time">online</span>
    </div>

    <div id="chat-container">
      <div id="chat">
        <div id="typing-indicator">
          <span>.</span><span>.</span><span>.</span>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div id="message-input" contenteditable="true" spellcheck="false" data-placeholder="Type a message..."></div>
    </div>
  </div>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#08080a;--surface:#101014;--surface-hover:#18181e;
      --text:#b0b0b8;--text-dim:#48484f;--accent:#2a2a34;
      --danger:#8b3a3a;--danger-dim:#5c2828;
      --partner-bg:#15151b;--partner-text:#a0a0a8;
      --user-bg:#1c1c24;--user-text:#808088;
      --online:#3a6b3a;--offline:#4a4a50;
      --font:'SF Mono','Fira Code','Cascadia Code','Consolas',monospace;
      --r:6px;
    }
    html,body{height:100%;overflow:hidden}
    body{
      background:var(--bg);color:var(--text);
      font-family:var(--font);font-size:13px;line-height:1.65;
      -webkit-font-smoothing:antialiased;
    }
    body::after{
      content:'';position:fixed;inset:0;
      background:repeating-linear-gradient(
        0deg,transparent,transparent 2px,
        rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px
      );
      pointer-events:none;z-index:1000;
    }
    #app{
      max-width:520px;margin:0 auto;height:100vh;
      display:flex;flex-direction:column;
      position:relative;
    }

    #status-bar{
      padding:14px 20px;display:flex;justify-content:space-between;
      align-items:center;border-bottom:1px solid var(--accent);
      background:var(--surface);flex-shrink:0;
      position:relative;z-index:2;
    }
    #status-left{display:flex;align-items:center;gap:9px}
    #status-dot{
      width:7px;height:7px;border-radius:50%;
      background:var(--online);flex-shrink:0;
      transition:background 1.5s ease;
    }
    #status-dot.online{animation:pulse 3.5s ease-in-out infinite}
    #status-dot.offline{background:var(--offline);animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
    #status-name{
      font-weight:600;color:#c8c8d0;font-size:13.5px;
      transition:opacity 1.5s ease;
    }
    #status-time{
      font-size:10.5px;color:var(--text-dim);
      letter-spacing:0.04em;text-transform:lowercase;
      transition:color 1.5s ease;
    }

    #chat-container{
      flex:1;overflow-y:auto;padding:20px 16px 12px;
      scroll-behavior:smooth;position:relative;
    }
    #chat{display:flex;flex-direction:column;gap:4px}

    #typing-indicator{
      align-self:flex-start;padding:10px 18px;
      background:var(--partner-bg);border-radius:var(--r);
      border-bottom-left-radius:2px;
      display:none;margin-top:4px;
      opacity:0;transition:opacity 0.4s ease;
    }
    #typing-indicator.visible{display:flex;opacity:1}
    #typing-indicator span{
      color:var(--text-dim);font-size:18px;
      letter-spacing:0.3em;line-height:1;
      animation:dotPulse 1.4s ease-in-out infinite;
    }
    #typing-indicator span:nth-child(2){animation-delay:0.2s}
    #typing-indicator span:nth-child(3){animation-delay:0.4s}
    @keyframes dotPulse{0%,100%{opacity:0.1}50%{opacity:0.6}}

    .message{
      max-width:80%;padding:9px 13px;border-radius:var(--r);
      line-height:1.65;word-break:break-word;
      opacity:0;transform:translateY(4px);
      animation:msgIn 0.3s ease forwards;
    }
    @keyframes msgIn{to{opacity:1;transform:translateY(0)}}
    .partner-msg{
      align-self:flex-start;
      background:var(--partner-bg);color:var(--partner-text);
      border-bottom-left-radius:2px;
    }
    .user-msg{
      align-self:flex-end;
      background:var(--user-bg);color:var(--user-text);
      border-bottom-right-radius:2px;
      font-style:italic;
    }
    .user-msg.fading{
      transition:opacity 8s ease-in;
      opacity:0 !important;
    }
    .user-msg.gone{
      display:none;
    }
    .user-ghost{
      align-self:flex-end;
      padding:3px 13px;font-size:10px;
      color:var(--text-dim);opacity:0;
      animation:ghostIn 5s ease 2s forwards;
      letter-spacing:0.15em;
    }
    @keyframes ghostIn{to{opacity:0.2}}

    .deleted{
      text-decoration:line-through;
      text-decoration-color:var(--danger-dim);
      text-decoration-thickness:1.5px;
      opacity:0.25;
    }
    .cursor-blink{
      color:var(--partner-text);
      animation:cblink 0.55s step-end infinite;
      font-weight:400;
    }
    @keyframes cblink{0%,100%{opacity:1}50%{opacity:0}}

    #chat-container::-webkit-scrollbar{width:2px}
    #chat-container::-webkit-scrollbar-track{background:transparent}
    #chat-container::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

    #input-area{
      padding:10px 16px 24px;border-top:1px solid var(--accent);
      background:var(--surface);flex-shrink:0;
    }
    #message-input{
      width:100%;background:var(--bg);border:1px solid var(--accent);
      border-radius:var(--r);padding:10px 13px;
      color:var(--text);font-family:var(--font);font-size:13px;
      outline:none;min-height:40px;max-height:100px;
      overflow-y:auto;line-height:1.5;
      transition:border-color 0.2s ease, opacity 0.8s ease;
    }
    #message-input:empty::before{
      content:attr(data-placeholder);
      color:var(--text-dim);pointer-events:none;
    }
    #message-input:focus{border-color:#3a3a48}
    #message-input.disabled{
      opacity:0.15;cursor:default;pointer-events:none;
    }

    #epilogue{
      text-align:center;color:var(--text-dim);
      font-size:11px;font-style:italic;
      padding:32px 20px 8px;letter-spacing:0.02em;
      opacity:0;line-height:1.8;
      animation:epFade 8s ease 4s forwards;
    }
    @keyframes epFade{to{opacity:0.4}}

    .timestamp{
      text-align:center;font-size:10px;
      color:var(--text-dim);opacity:0.5;
      padding:12px 0 4px;letter-spacing:0.06em;
    }
  </style>

  <script>
  (() => {
    const chatEl        = document.getElementById('chat');
    const chatContainer = document.getElementById('chat-container');
    const typingEl      = document.getElementById('typing-indicator');
    const inputEl       = document.getElementById('message-input');
    const statusDot     = document.getElementById('status-dot');
    const statusTime    = document.getElementById('status-time');
    const statusName    = document.getElementById('status-name');

    let inputEnabled = false;
    let userMsgCount = 0;
    let ended = false;

    const wait = ms => new Promise(r => setTimeout(r, ms));

    function scrollBottom() {
      requestAnimationFrame(() => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      });
    }

    function showTyping() {
      typingEl.classList.add('visible');
      scrollBottom();
    }
    function hideTyping() {
      typingEl.classList.remove('visible');
    }

    function enableInput(placeholder) {
      inputEnabled = true;
      inputEl.classList.remove('disabled');
      inputEl.setAttribute('data-placeholder', placeholder || 'Type a message...');
      inputEl.focus();
    }
    function disableInput() {
      inputEnabled = false;
      inputEl.classList.add('disabled');
      inputEl.blur();
    }

    function addTimestamp(text) {
      const d = document.createElement('div');
      d.className = 'timestamp';
      d.textContent = text;
      chatEl.appendChild(d);
      scrollBottom();
    }

    function addUserBubble(text) {
      const div = document.createElement('div');
      div.className = 'message user-msg';
      div.textContent = text;
      chatEl.appendChild(div);
      scrollBottom();
      userMsgCount++;

      setTimeout(() => {
        if (div.classList.contains('gone')) return;
        div.classList.add('fading');
        setTimeout(() => {
          div.classList.add('gone');
          const ghost = document.createElement('div');
          ghost.className = 'user-ghost';
          ghost.textContent = '· · ·';
          chatEl.insertBefore(ghost, div.nextSibling);
          scrollBottom();
        }, 8500);
      }, 28000);
    }

    function waitForUserMsg(timeoutMs) {
      return new Promise(resolve => {
        if (ended) { resolve(null); return; }
        let resolved = false;

        function onDown(e) {
          if (!inputEnabled || resolved) return;
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const txt = inputEl.innerText.replace(/\s+/g, ' ').trim();
            if (!txt) return;
            inputEl.innerText = '';
            resolved = true;
            inputEl.removeEventListener('keydown', onDown);
            resolve(txt);
          }
        }
        inputEl.addEventListener('keydown', onDown);

        if (timeoutMs) {
          setTimeout(() => {
            if (!resolved) {
              resolved = true;
              inputEl.removeEventListener('keydown', onDown);
              inputEl.innerText = '';
              resolve(null);
            }
          }, timeoutMs);
        }
      });
    }

    async function typeMessage(actions, preTypeMs) {
      if (preTypeMs === undefined) preTypeMs = 2000;
      showTyping();
      await wait(preTypeMs);
      hideTyping();
      await wait(300);

      const msgEl = document.createElement('div');
      msgEl.className = 'message partner-msg';

      const content = document.createElement('span');
      msgEl.appendChild(content);

      const cursor = document.createElement('span');
      cursor.className = 'cursor-blink';
      cursor.textContent = '\u258C';
      msgEl.appendChild(cursor);

      chatEl.appendChild(msgEl);
      scrollBottom();

      const flat = [];
      for (const a of actions) {
        if (a.type === 'type' && a.text) {
          for (const c of a.text) flat.push({ type: 'type', char: c });
        } else {
          flat.push(a);
        }
      }

      const chars = [];

      for (const act of flat) {
        if (ended) break;

        switch (act.type) {

          case 'type': {
            await wait(25 + Math.random() * 55);
            if (ended) break;
            const s = document.createElement('span');
            s.textContent = act.char;
            content.insertBefore(s, cursor);
            chars.push({ el: s, deleted: false });
            scrollBottom();
            break;
          }

          case 'pause': {
            await wait(act.ms || 1000);
            break;
          }

          case 'backspace': {
            const live = chars.filter(c => !c.deleted);
            if (live.length) content.insertBefore(cursor, live[live.length - 1].el);
            await wait(220 + Math.random() * 200);
            const live2 = chars.filter(c => !c.deleted);
            if (live2.length) {
              live2[live2.length - 1].el.classList.add('deleted');
              live2[live2.length - 1].deleted = true;
            }
            scrollBottom();
            break;
          }

          case 'delete': {
            const n = act.count || 1;
            for (let i = 0; i < n; i++) {
              if (ended) break;
              const live = chars.filter(c => !c.deleted);
              if (!live.length) break;
              content.insertBefore(cursor, live[live.length - 1].el);
              await wait(150 + Math.random() * 130);
              const live2 = chars.filter(c => !c.deleted);
              if (live2.length) {
                live2[live2.length - 1].el.classList.add('deleted');
                live2[live2.length - 1].deleted = true;
              }
              scrollBottom();
            }
            break;
          }

          case 'replace': {
            const orig = act.from || '';
            for (const ch of orig) {
              if (ended) break;
              await wait(30 + Math.random() * 45);
              const s = document.createElement('span');
              s.textContent = ch;
              content.insertBefore(s, cursor);
              chars.push({ el: s, deleted: false });
            }
            scrollBottom();
            await wait(act.hesitate || 1200);
            for (let i = 0; i < orig.length; i++) {
              if (ended) break;
              const live = chars.filter(c => !c.deleted);
              if (!live.length) break;
              content.insertBefore(cursor, live[live.length - 1].el);
              await wait(100 + Math.random() * 80);
              const live2 = chars.filter(c => !c.deleted);
              if (live2.length) {
                live2[live2.length - 1].el.classList.add('deleted');
                live2[live2.length - 1].deleted = true;
              }
            }
            scrollBottom();
            if (act.to) {
              await wait(500 + Math.random() * 300);
              for (const ch of act.to) {
                if (ended) break;
                await wait(25 + Math.random() * 50);
                const s = document.createElement('span');
                s.textContent = ch;
                content.insertBefore(s, cursor);
                chars.push({ el: s, deleted: false });
              }
            }
            scrollBottom();
            break;
          }
        }
      }

      await wait(600);
      if (cursor.parentNode) cursor.remove();

      return msgEl;
    }

    async function emptyBubble(durationMs) {
      showTyping();
      await wait(durationMs);
      hideTyping();
      await wait(400);
    }

    /* ═══════════════════════════════════
       CONVERSATION
       ═══════════════════════════════════ */
    async function run() {
      disableInput();
      await wait(2200);

      addTimestamp('today');

      // 1. Empty bubble — June starts, stops
      await emptyBubble(3200);
      await wait(1500);

      // 2. "hi" → "Hello."
      await typeMessage([
        { type: 'type', text: 'hi' },
        { type: 'pause', ms: 1400 },
        { type: 'delete', count: 1 },
        { type: 'pause', ms: 700 },
        { type: 'type', text: 'Hello' },
        { type: 'pause', ms: 400 },
        { type: 'type', text: '.' },
      ], 2500);
      await wait(800);

      // 3. User responds
      enableInput();
      const r1 = await waitForUserMsg(30000);
      disableInput();
      if (r1) addUserBubble(r1);
      await wait(900 + Math.random() * 500);

      // 4. "I kept your number."
      await typeMessage([
        { type: 'type', text: 'I kept your number' },
        { type: 'pause', ms: 600 },
        { type: 'type', text: '.' },
        { type: 'pause', ms: 1300 },
        { type: 'type', text: ' I don\'t know why I\'m telling you that' },
        { type: 'type', text: '.' },
      ], 3000);
      await wait(700);

      // 5. User responds
      enableInput();
      const r2 = await waitForUserMsg(30000);
      disableInput();
      if (r2) addUserBubble(r2);
      await wait(1000 + Math.random() * 600);

      // 6. "Do you remember that night on the roof" → DELETE → "what happened to us?"
      await typeMessage([
        { type: 'type', text: 'Do you remember' },
        { type: 'pause', ms: 1200 },
        { type: 'type', text: ' that night on the roof' },
        { type: 'pause', ms: 2600 },
        { type: 'delete', count: 19 },
        { type: 'pause', ms: 1400 },
        { type: 'type', text: 'what happened to us?' },
      ], 4000);
      await wait(700);

      // 7. User responds
      enableInput('...');
      const r3 = await waitForUserMsg(30000);
      disableInput();
      if (r3) addUserBubble(r3);
      await wait(800 + Math.random() * 400);

      // 8. Long uncomfortable silence
      await emptyBubble(5800);
      await wait(1200);

      // 9. Another silence
      await emptyBubble(4200);
      await wait(900);

      // 10. User can respond
      enableInput();
      const r4 = await waitForUserMsg(28000);
      disableInput();
      if (r4) addUserBubble(r4);
      await wait(1000 + Math.random() * 600);

      // 11. "I was going to say something" → "I think about it a lot. That night."
      await typeMessage([
        { type: 'type', text: 'I was going to' },
        { type: 'pause', ms: 800 },
        { type: 'type', text: ' say' },
        { type: 'pause', ms: 600 },
        { type: 'type', text: ' something' },
        { type: 'pause', ms: 2200 },
        { type: 'delete', count: 9 },
        { type: 'pause', ms: 800 },
        { type: 'type', text: 'I think about it a lot' },
        { type: 'type', text: '.' },
        { type: 'pause', ms: 1000 },
        { type: 'type', text: ' That night' },
        { type: 'type', text: '.' },
      ], 3000);
      await wait(700);

      // 12. User responds
      enableInput();
      const r5 = await waitForUserMsg(30000);
      disableInput();
      if (r5) addUserBubble(r5);
      await wait(1100 + Math.random() * 500);

      // 13. The almost-confession
      await typeMessage([
        { type: 'type', text: 'I wanted to tell you' },
        { type: 'pause', ms: 900 },
        { type: 'type', text: ' that I' },
        { type: 'pause', ms: 700 },
        { type: 'type', text: ' never' },
        { type: 'pause', ms: 1100 },
        { type: 'type', text: ' stopped thinking about' },
        { type: 'pause', ms: 500 },
        { type: 'type', text: ' you' },
        { type: 'pause', ms: 3800 },
        { type: 'delete', count: 23 },
        { type: 'pause', ms: 2400 },
        { type: 'type', text: 'I\'m glad you\'re doing well' },
        { type: 'type', text: '.' },
      ], 6000);
      await wait(600);

      // 14. One last silence
      await emptyBubble(3500);
      await wait(1000);

      // 15. June goes offline
      ended = true;
      statusDot.classList.remove('online');
      statusDot.classList.add('offline');
      statusTime.textContent = 'last seen just now';
      statusName.style.opacity = '0.4';
      inputEl.classList.add('disabled');
      inputEl.removeAttribute('contenteditable');
      inputEl.setAttribute('data-placeholder', '');
      inputEl.innerText = '';
      inputEnabled = false;

      // Epilogue
      await wait(4000);
      const ep = document.createElement('div');
      ep.id = 'epilogue';
      ep.innerHTML = 'your words are hers for thirty seconds.<br>then they\'re hers alone to notice missing.';
      chatEl.appendChild(ep);
      scrollBottom();
    }

    run();
  })();
  </script>
</body>
</html>
