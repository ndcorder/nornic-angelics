// ── Render functions ──

function getStatusClass(code) {
  if (code >= 200 && code < 300) return 'status-2xx';
  if (code >= 300 && code < 400) return 'status-3xx';
  if (code >= 400 && code < 500) return 'status-4xx';
  return 'status-5xx';
}

function renderHeaders(status, statusText, headers) {
  const sc = getStatusClass(status);
  let html = `<div class="status-line">
    <span class="header-key">HTTP/1.1 </span>
    <span class="status-code-display ${sc}">${status}</span>
    <span class="header-val">${statusText}</span>
  </div>`;

  for (const [key, val] of Object.entries(headers)) {
    html += `<div class="header-line">
      <span class="header-key">${key}:</span>
      <span class="header-val"> ${val}</span>
    </div>`;
  }

  document.getElementById('headersContent').innerHTML = html;
}

function renderBody(html) {
  document.getElementById('bodyPanel').innerHTML = html;

  // Reveal fragments based on visited routes
  document.querySelectorAll('.hidden-fragment').forEach(el => {
    const requires = el.dataset.requires;
    if (requires && hasVisited(requires)) {
      el.classList.add('revealed');
    }
  });
}

function resolveBody(route) {
  let body = route.body;

  // Replace {{fragments}} placeholder with conditional fragments
  if (route.fragments) {
    let fragmentsHtml = '';
    for (const [reqPath, fragHtml] of Object.entries(route.fragments)) {
      fragmentsHtml += fragHtml;
    }
    body = body.replace('{{fragments}}', fragmentsHtml);
  }

  return body;
}

        </div>
      </div>`;
    renderHeaders(404, 'Not Found', {
      'Server': 'nginx/1.18.0 (Ubuntu)',
      'Date': new Date().toUTCString(),
      'Content-Type': 'text/html; charset=UTF-8',
    });
    renderBody(fallbackBody);
    return;
  }

  // Handle /varin gating
  if (route.requireVisited !== undefined) {
    if (visitedCount() < route.requireVisited) {
      renderHeaders(route.lockedStatus, route.lockedStatusText, route.lockedHeaders);
      renderBody(route.lockedBody);
      markVisited(path);
      return;
    }
  }

  // Render route
  renderHeaders(route.status, route.statusText, route.headers);
  renderBody(resolveBody(route));
  markVisited(path);

  // Update title
  document.title = `${route.status} ${route.statusText} — Clarimond Biosystems`;
}

// ── Input handling ──

const addrInput = document.getElementById('addr');

addrInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const path = addrInput.value.trim();
    if (path !== addrInput.dataset.currentPath) {
      window.location.hash = path;
    }
  }
});

window.addEventListener('hashchange', function() {
  const path = window.location.hash.slice(1);
  addrInput.value = path;
  addrInput.dataset.currentPath = path;
  navigate(path);
});

// ── Initialize ──

(function init() {
  const hash = window.location.hash.slice(1);
  if (hash) {
    addrInput.value = hash;
    addrInput.dataset.currentPath = hash;
    navigate(hash);
  } else {
    addrInput.value = '';
    addrInput.dataset.currentPath = '';
    navigate('');
  }
})();
</script>
