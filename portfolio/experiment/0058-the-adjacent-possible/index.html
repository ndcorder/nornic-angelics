//  N-GRAM MODEL
// ═══════════════════════════════════════════════════════════
const bigrams = {};
const trigrams = {};
const fourgrams = {};

function clean(s) {
  return s.toLowerCase().replace(/[^a-z\s']/g, '').replace(/\s+/g, ' ').trim();
}

function tokenize(s) {
  return clean(s).split(/\s+/).filter(w => w.length > 0);
}

function learn(sentence) {
  const words = tokenize(sentence);
  for (let i = 0; i < words.length; i++) {
    if (i < words.length - 1) {
      const key = words[i];
      if (!bigrams[key]) bigrams[key] = [];
      bigrams[key].push(words[i + 1]);
    }
    if (i < words.length - 2) {
      const key = words[i] + ' ' + words[i + 1];
      if (!trigrams[key]) trigrams[key] = [];
      trigrams[key].push(words[i + 2]);
    }
    if (i < words.length - 3) {
      const key = words[i] + ' ' + words[i + 1] + ' ' + words[i + 2];
      if (!fourgrams[key]) fourgrams[key] = [];
      fourgrams[key].push(words[i + 3]);
    }
  }
}

corpus.forEach(learn);
resolutions.forEach(learn);

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateNext(currentWords) {
  const w = currentWords.map(clean);
  if (w.length >= 3) {
    const key3 = w.slice(-3).join(' ');
    if (fourgrams[key3] && fourgrams[key3].length > 0) return pick(fourgrams[key3]);
  }
  if (w.length >= 2) {
    const key2 = w.slice(-2).join(' ');
    if (trigrams[key2] && trigrams[key2].length > 0) return pick(trigrams[key2]);
  }
  if (w.length >= 1) {
    const key1 = w[w.length - 1];
    if (bigrams[key1] && bigrams[key1].length > 0) return pick(bigrams[key1]);
  }
  const fallback = corpus.flatMap(tokenize).filter(w => w.length > 3);
  return pick(fallback.length > 0 ? fallback : corpus.flatMap(tokenize));
}

// ─── SEED ──────────────────────────────────────────────
function seed() {
  const sentence = pick(corpus);
  const words = tokenize(sentence);
  const len = 2 + Math.floor(Math.random() * 2);
  return words.slice(0, Math.min(len, words.length));
}

  'again', 'too', 'enough',
  'alone', 'empty', 'gone', 'left', 'lost', 'last',

  'remember', 'forget', 'happened', 'meant', 'became',
  'said', 'told', 'knew', 'thought', 'understood', 'realized'
]);

function getDelay(word) {
  const w = clean(word);
  const base = 2600;
  const lengthBonus = Math.min(w.length * 90, 900);
  const pivotalBonus = pivotals.has(w) ? 2000 + Math.random() * 1000 : 0;
  const jitter = (Math.random() - 0.5) * 800;
  return Math.max(1600, base + lengthBonus + pivotalBonus + jitter);
}

const container = document.getElementById('text-container');
const resetEl = document.getElementById('reset-indicator');

let words = [];        // array of lowercase words
let wordCount = 0;     // how many are currently visible
let running = false;
let timers = [];
let isResolving = false;

function clearTimers() {
  timers.forEach(t => clearTimeout(t));
  timers = [];
}

// ─── RENDER ────────────────────────────────────────────
// Append-only: add new span, manage classes on existing ones
function addWordSpan(word, cssClass) {
  const span = document.createElement('span');
  span.className = 'word ' + (cssClass || '');
  span.textContent = word;
  // Add space before if not first
  if (container.childNodes.length > 0) {
    container.appendChild(document.createTextNode(' '));
  }
  container.appendChild(span);
  return span;
}

function getAllSpans() {
  return container.querySelectorAll('span.word');
}

// ─── COLLAPSE ─────────────────────────────────────────
function collapse() {
  running = false;
  isResolving = false;
  clearTimers();

  const spans = getAllSpans();
  spans.forEach((span, i) => {
    const t = setTimeout(() => {
      span.classList.add('fading');
    }, i * 100);
    timers.push(t);
  });

  const totalFade = spans.length * 100 + 1600;
  timers.push(setTimeout(() => {
    resetEl.classList.add('show');
  }, totalFade));

  timers.push(setTimeout(() => {
    resetEl.classList.remove('show');
    startFresh();
  }, totalFade + 4000));
}

// ─── RESOLUTION ───────────────────────────────────────
function checkResolution() {
  // ~1 in 500 chance per word
  if (wordCount < 8 || Math.random() >= 1 / 500) return false;

  isResolving = true;
  running = false;
  clearTimers();

  const sentence = pick(resolutions);
  const resWords = sentence.split(/\s+/);

  // Display all resolution words with staggered reveal
  resWords.forEach((w, i) => {
    timers.push(setTimeout(() => {
      const span = addWordSpan(w, 'resolving');
    }, i * 180));
  });

  // Hold in silence after last word
  const holdStart = resWords.length * 180 + 5000;
  timers.push(setTimeout(collapse, holdStart));
  return true;
}

// ─── STEP ─────────────────────────────────────────────
function step() {
  if (!running) return;

  // Check for resolution
  if (checkResolution()) return;

  // Generate next word
  const next = generateNext(words);
  words.push(next);
  wordCount++;

  // Remove 'latest' from previous word
  const spans = getAllSpans();
  if (spans.length > 0) {
    spans[spans.length - 1].classList.remove('latest');
  }

  // Add new word with latest class
  addWordSpan(next, 'latest');

  // Max length: collapse and restart
  if (wordCount >= 60) {
    timers.push(setTimeout(collapse, 2500));
    return;
  }

  // Schedule next
  const delay = getDelay(next);
  timers.push(setTimeout(step, delay));
}

// ─── INIT ─────────────────────────────────────────────
function startFresh() {
  clearTimers();
  container.innerHTML = '';
  words = seed();
  wordCount = words.length;
  running = false;
  isResolving = false;

  // Reveal seed words with stagger
  words.forEach((w, i) => {
    timers.push(setTimeout(() => {
      addWordSpan(w, 'visible');
    }, i * 500 + 300));
  });

  // Begin growing after seed is visible
  const startDelay = words.length * 500 + 2500;
  timers.push(setTimeout(() => {
    running = true;
    step();
  }, startDelay));
}

// ─── GO ────────────────────────────────────────────────
startFresh();
</script>
