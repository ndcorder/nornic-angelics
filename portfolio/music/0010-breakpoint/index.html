<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakpoint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #08080a;
            color: #b0b0b0;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #visuals {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        #overlay {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.2rem;
            padding: 1rem;
        }
        #overlay h1 {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.85em;
            color: #606060;
            text-indent: 0.85em;
            user-select: none;
        }
        #phase-label {
            font-size: 0.6rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #3a3a3a;
            min-height: 1.2em;
            transition: color 0.6s ease;
        }
        #phase-label.active { color: #d44; }
        #play-btn {
            width: 68px; height: 68px;
            border-radius: 50%;
            border: 1px solid #2a2a2a;
            background: #0d0d0d;
            color: #555;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s, color 0.3s, box-shadow 0.3s, background 0.3s;
            outline: none;
        }
        #play-btn:hover, #play-btn:focus-visible {
            border-color: #444;
            color: #888;
            box-shadow: 0 0 24px rgba(80,80,80,0.08);
        }
        #play-btn.playing {
            border-color: #3a3a3a;
            color: #666;
        }
        #play-btn.bp-flash {
            border-color: #e44;
            color: #e44;
            box-shadow: 0 0 30px rgba(220,50,50,0.15);
            background: #140808;
        }
        #play-btn svg { width: 20px; height: 20px; fill: currentColor; }
        #progress-track {
            width: 200px;
            height: 1px;
            background: #1a1a1a;
            position: relative;
        }
        #progress-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            width: 0%;
            background: #3a3a3a;
            transition: width 1.5s linear, background 0.5s;
        }
        #progress-fill.bp-active {
            background: #a33;
            transition: width 0.5s linear, background 0.5s;
        }
        #time-display {
            font-size: 0.55rem;
            color: #2e2e2e;
            letter-spacing: 0.2em;
        }
        #hint {
            font-size: 0.5rem;
            color: #1e1e1e;
            letter-spacing: 0.15em;
            text-align: center;
            max-width: 260px;
            line-height: 1.9;
            position: absolute;
            bottom: 3rem;
            opacity: 0;
            transition: opacity 2s ease;
        }
        #hint.visible { opacity: 1; }
        #error-msg {
            font-size: 0.55rem;
            color: #a44;
            letter-spacing: 0.1em;
            text-align: center;
            max-width: 300px;
            display: none;
        }
        @media (prefers-reduced-motion: reduce) {
            * { transition-duration: 0.01s !important; animation-duration: 0.01s !important; }
        }
    </style>
</head>
<body>
    <canvas id="visuals"></canvas>
    <div id="overlay">
        <h1>BREAKPOINT</h1>
        <div id="phase-label" aria-live="polite"></div>
        <button id="play-btn" aria-label="Play or pause">
            <svg id="icon-play" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
        </button>
        <div id="progress-track"><div id="progress-fill"></div></div>
        <div id="time-display">0:00 / 3:08</div>
        <div id="error-msg"></div>
    </div>
    <div id="hint">headphones recommended &middot; two conversations, two channels</div>

    <script type="module">
        // ─── Strudel imports ───
        let strudel;
        try {
            strudel = await import('https://unpkg.com/strudel@1.2.5/repl.js');
        } catch (e) {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('error-msg').textContent =
                'Could not load audio engine. Check your connection and refresh.';
            throw e;
        }

        const {
            s, note, gain, struct, slowcat, stack, degrade, rev,
            sometimes, delay, room, shimmer, hp, speed, release,
            attack, saw, tri, square, sine, pan, fast, slow,
            cpb, timeCat, iter, segment, xfade, overlay
        } = strudel;

        // ─── Phase timeline ───
        // 6 conversation windows + 1 resolution, ~188s at 120bpm
        // Phases alternate between calm conversation and breakpoint rupture
        const PHASES = [
            { start: 0,    end: 32,   bp: 30,   label: 'conversation i'   },
            { start: 32,   end: 62,   bp: 60,   label: 'conversation ii'  },
            { start: 62,   end: 92,   bp: 90,   label: 'conversation iii' },
            { start: 92,   end: 122,  bp: 120,  label: 'conversation iv'  },
            { start: 122,  end: 152,  bp: 150,  label: 'conversation v'   },
            { start: 152,  end: 178,  bp: 176,  label: 'conversation vi'  },
            { start: 178,  end: 188,  bp: null,  label: 'resolution'       }
        ];
        const TOTAL_CYCLES = 188; // cycles at whatever cps

        // ─── Utility ───
        const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const shuffle = (a) => {
            const b = [...a];
            for (let i = b.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [b[i], b[j]] = [b[j], b[i]];
            }
            return b;
        };

        // ─── Scale: C natural minor as note names ───
        const DEGREES = ['c', 'd', 'eb', 'f', 'g', 'ab', 'bb'];
        const degreeToNote = (deg, octave) => {
            const d = ((deg % 7) + 7) % 7;
            const o = octave + Math.floor(deg / 7);
            return DEGREES[d] + o;
        };

        // ─── Phrase library ───
        // Each phrase: array of [scaleDegree, durationInBeats, velocity 0-1]
        const VOICE_A_PHRASES = [
            // Phrase 0: ascending question
            [[0,1,.8],[2,1,.65],[4,1.5,.7],[5,1,.85],[7,.5,.5]],
            // Phrase 1: gentle arc
            [[4,1.5,.75],[5,.5,.6],[7,1,.8],[5,1,.65],[4,.5,.45],[2,1,.55]],
            // Phrase 2: low rumble
            [[0,2,.6],[-1,1,.5],[0,.5,.45],[2,1.5,.7],[4,1,.8]],
            // Phrase 3: high reach
            [[7,1,.7],[9,.5,.6],[11,1.5,.85],[12,1,.9],[11,.5,.65],[9,1,.5]],
            // Phrase 4: descent
            [[5,1,.7],[4,.5,.55],[2,1,.65],[0,1.5,.8],[-1,1,.6],[0,.5,.5]]
        ];

        const VOICE_B_PHRASES = [
            // Phrase 0: sharp staccato
            [[7,.5,.85],[9,.5,.7],[7,.5,.6],[5,.5,.75],[4,1,.8],[2,.5,.55]],
            // Phrase 1: chromatic drift
            [[5,.5,.6],[6,.5,.5],[7,1,.75],[9,1,.8],[11,.5,.65],[12,1,.7]],
            // Phrase 2: clustered
            [[11,.5,.8],[12,.5,.7],[11,1,.6],[9,.5,.75],[7,1,.85],[5,.5,.6]],
            // Phrase 3: wide leap
            [[0,1,.65],[7,1.5,.8],[5,.5,.55],[12,1,.85],[11,1,.7]],
            // Phrase 4: trill-like
            [[7,.5,.75],[8,.5,.65],[7,.5,.7],[8,.5,.6],[9,1,.8],[7,1.5,.85]]
        ];

        // ─── Convert phrase → structured rhythm string + note array ───
        function phraseToPattern(phrase, octave, density) {
            const beats = [];
            let totalBeats = 0;
            const maxBeats = 16;

            // Repeat phrase to fill cycle
            let pi = 0;
            while (totalBeats < maxBeats) {
                const [deg, dur, vel] = phrase[pi % phrase.length];
                const isHit = Math.random() < density;
                beats.push({ deg, dur, vel: isHit ? vel : 0 });
                totalBeats += dur;
                pi++;
            }

            // Build struct string and note list
            let structStr = '';
            const activeNotes = [];
            const allNotes = [];

            for (const b of beats) {
                const sym = b.vel > 0 ? 'x' : '~';
                // Subdivide for durations > 1
                if (b.dur >= 2) {
                    structStr += sym + ' '.repeat(Math.round(b.dur) - 1) + ' ';
                } else {
                    structStr += sym + ' ';
                }
                const noteStr = degreeToNote(b.deg, octave);
                allNotes.push(noteStr);
                if (b.vel > 0) activeNotes.push(noteStr);
            }

            return {
                struct: structStr.trim(),
                notes: activeNotes.length > 0 ? activeNotes : ['c4'],
                allNotes: allNotes
            };
        }

        // ─── Build a hybrid phrase from two parents (accumulation) ───
        function hybridPhrase(parentA, parentB) {
            const len = 3 + Math.floor(Math.random() * 4);
            const result = [];
            for (let i = 0; i < len; i++) {
                const src = Math.random() < 0.5 ? parentA : parentB;
                const idx = Math.floor(Math.random() * src.length);
                const [deg, dur, vel] = src[idx];
                // Slight mutation
                const degMut = Math.random() < 0.3 ? deg + Math.floor(Math.random() * 3 - 1) : deg;
                result.push([degMut, dur * (0.75 + Math.random() * 0.5), vel * (0.6 + Math.random() * 0.4)]);
            }
            return result;
        }

        // ─── Build one complete composition ───
        // Returns two Strudel patterns: left channel and right channel
        function buildComposition() {
            const leftParts = [];
            const rightParts = [];

            let prevPhraseA = VOICE_A_PHRASES[0];
            let prevPhraseB = VOICE_B_PHRASES[0];

            for (let pi = 0; pi < PHASES.length; pi++) {
                const phase = PHASES[pi];
                const cycleDur = phase.end - phase.start;

                let phraseA, phraseB;

                if (pi === 0) {
                    // First phase: use original phrases
                    phraseA = VOICE_A_PHRASES[0];
                    phraseB = VOICE_B_PHRASES[0];
                } else {
                    // Later phases: fragment, swap, invert from accumulated material
                    const allA = [...VOICE_A_PHRASES];
                    const allB = [...VOICE_B_PHRASES];

                    phraseA = pick(allA);
                    phraseB = pick(allB);

                    // Swap chance (the "exchange" at breakpoint)
                    if (Math.random() < 0.4 + pi * 0.08) {
                        [phraseA, phraseB] = [phraseB, phraseA];
                    }

                    // Reverse (time-reversal)
                    if (Math.random() < 0.35) phraseA = [...phraseA].reverse();
                    if (Math.random() < 0.35) phraseB = [...phraseB].reverse();

                    // Invert intervals
                    if (Math.random() < 0.3) {
                        phraseA = phraseA.map(([d, dur, vel]) => [-d, dur, vel]);
                    }

                    // Hybrid: mix cells from both
                    if (Math.random() < 0.5) {
                        phraseA = hybridPhrase(phraseA, prevPhraseB);
                        phraseB = hybridPhrase(phraseB, prevPhraseA);
                    }
                }

                prevPhraseA = phraseA;
                prevPhraseB = phraseB;

                // Accumulate into library
                VOICE_A_PHRASES.push(hybridPhrase(phraseA, phraseB));
                VOICE_B_PHRASES.push(hybridPhrase(phraseB, phraseA));

                // Convert to patterns
                const density = 0.55 + Math.random() * 0.2;
                const patA = phraseToPattern(phraseA, 4, density);
                const patB = phraseToPattern(phraseB, 5, density);

                // Voice A: warm, triangle + filtered saw
                const voiceAMelody = note(patA.notes)
                    .s('triangle')
                    .gain(0.6)
                    .struct(patA.struct);

                const voiceAEcho = note(patA.notes)
                    .s('triangle')
                    .gain(0.25)
                    .delay(0.3)
                    .delaytime(0.375)
                    .delayfeedback(0.35)
                    .struct(patA.struct);

                const voiceAPad = note([degreeToNote(0, 3), degreeToNote(2, 3), degreeToNote(4, 3)])
                    .s('saw')
                    .gain(0.05)
                    .attack(0.8)
                    .release(2)
                    .room(0.5);

                // Voice B: sharp, square + FM-like
                const voiceBMelody = note(patB.notes)
                    .s('square')
                    .gain(0.45)
                    .struct(patB.struct);

                const voiceBEcho = note(patB.notes)
                    .s('square')
                    .gain(0.18)
                    .delay(0.25)
                    .delaytime(0.333)
                    .delayfeedback(0.3)
                    .struct(patB.struct);

                const voiceBPad = note([degreeToNote(4, 4), degreeToNote(6, 4), degreeToNote(0, 5)])
                    .s('sine')
                    .gain(0.04)
                    .attack(1)
                    .release(2.5)
                    .room(0.4);

                // Phase gain: quiet near breakpoints, normal elsewhere
                // Using a simple constant gain per phase (Strudel's gain patterns)
                const phaseGain = phase.bp !== null && pi === PHASES.length - 2
                    ? 0.5 // quieter for penultimate
                    : 0.7;

                // Breakpoint burst material: fractured version
                let burstLeft = null, burstRight = null;
                if (phase.bp !== null) {
                    // Combine both phrase notes, scramble
                    const combined = shuffle([...patA.notes, ...patB.notes, ...patA.notes, ...patB.notes]);
                    const burstNotes = combined.slice(0, 6);
                    const burstStruct = shuffle('x x ~ x x ~ x ~ x x ~ x ~ x x ~'.split(' ')).join('').substring(0, 16);

                    burstLeft = note(burstNotes)
                        .s('square')
                        .gain(0.35)
                        .struct(burstStruct)
                        .room(0.4)
                        .delay(0.2)
                        .delayfeedback(0.5);

                    burstRight = note(burstNotes.slice().reverse())
                        .s('triangle')
                        .gain(0.3)
                        .struct(burstStruct.split('').reverse().join(''))
                        .room(0.4)
                        .delay(0.2)
                        .delayfeedback(0.5);
                }

                // Assemble left and right for this phase duration
                const leftStack = stack(
                    voiceAMelody,
                    voiceAEcho,
                    voiceAPad
                ).gain(phaseGain);

                const rightStack = stack(
                    voiceBMelody,
                    voiceBEcho,
                    voiceBPad
                ).gain(phaseGain);

                leftParts.push({ main: leftStack, burst: burstLeft, cycleDur });
                rightParts.push({ main: rightStack, burst: burstRight, cycleDur });
            }

            // Assemble into time-sequenced patterns using slowcat
            // slowcat plays each pattern for one cycle; slow stretches cycle duration
            const leftMains = slowcat(...leftParts.map(p => p.main.slow(p.cycleDur)));
            const rightMains = slowcat(...rightParts.map(p => p.main.slow(p.cycleDur)));

            // Bursts play on top at breakpoint moments
            // Use a single continuous burst pattern with gain masking
            const burstParts = [];
            for (let i = 0; i < PHASES.length; i++) {
                if (leftParts[i].burst && rightParts[i].burst) {
                    // Burst plays for a short window around the breakpoint
                    const burstDur = 4; // cycles
                    burstParts.push(
                        stack(leftParts[i].burst, rightParts[i].burst).slow(burstDur)
                    );
                } else {
                    burstParts.push(gain(0).slow(4));
                }
            }
            const burstPattern = slowcat(...burstParts);

            return {
                left: leftMains,
                right: rightMains,
                bursts: burstPattern
            };
        }

        // ─── Construct final pattern ───
        const comp = buildComposition();

        const composition = stack(
            comp.left.pan(0.15).gain(0.8),
            comp.right.pan(0.85).gain(0.8),
            comp.bursts.gain(0.6),
            // Subtle drone thread — center
            note('c2').s('sine').gain(0.02).attack(2).release(3).slow(64),
            note('g2').s('sine').gain(0.015).attack(3).release(4).slow(48)
        );

        // ─── Playback control ───
        const playBtn = document.getElementById('play-btn');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const progressFill = document.getElementById('progress-fill');
        const phaseLabel = document.getElementById('phase-label');
        const timeDisplay = document.getElementById('time-display');
        const hint = document.getElementById('hint');
        const errorMsg = document.getElementById('error-msg');

        let isPlaying = false;
        let startTime = 0;
        let animFrame = null;

        const TOTAL_SEC = 188; // approximate duration at 120bpm

        playBtn.addEventListener('click', async () => {
            if (!isPlaying) {
                try {
                    // Strudel's start plays the pattern
                    await strudel.start(composition);
                    isPlaying = true;
                    startTime = performance.now() / 1000;
                    playBtn.classList.add('playing');
                    iconPlay.style.display = 'none';
                    iconPause.style.display = 'block';
                    hint.classList.add('visible');
                    setTimeout(() => hint.classList.remove('visible'), 5000);
                    tick();
                } catch (err) {
                    console.error('Playback failed:', err);
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = 'Audio playback failed. Try refreshing the page.';
                }
            } else {
                strudel.stop();
                isPlaying = false;
                playBtn.classList.remove('playing');
                playBtn.classList.remove('bp-flash');
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                if (animFrame) cancelAnimationFrame(animFrame);
            }
        });

        function tick() {
            if (!isPlaying) return;
            const elapsed = performance.now() / 1000 - startTime;
            const t = elapsed % TOTAL_SEC;
            const pct = Math.min(elapsed / TOTAL_SEC * 100, 100);
            progressFill.style.width = pct + '%';

            const m = Math.floor(t / 60);
            const s = Math.floor(t % 60);
            timeDisplay.textContent = `${m}:${String(s).padStart(2, '0')} / 3:08`;

            // Detect current phase
            let phaseName = '';
            let bpNear = false;
            for (const ph of PHASES) {
                if (t >= ph.start && t < ph.end) {
                    phaseName = ph.label;
                    break;
                }
            }

            // Detect breakpoint proximity
            for (const ph of PHASES) {
                if (ph.bp !== null && Math.abs(t - ph.bp) < 3) {
                    bpNear = true;
                    break;
                }
            }

            phaseLabel.textContent = bpNear ? 'breakpoint' : phaseName;
            phaseLabel.classList.toggle('active', bpNear);
            playBtn.classList.toggle('bp-flash', bpNear);
            progressFill.classList.toggle('bp-active', bpNear);

            // Stop after full duration + fade
            if (elapsed > TOTAL_SEC + 2) {
                strudel.stop();
                isPlaying = false;
                playBtn.classList.remove('playing', 'bp-flash');
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                progressFill.style.width = '100%';
                return;
            }

            animFrame = requestAnimationFrame(tick);
        }

        // ─── Canvas visualisation ───
        const cvs = document.getElementById('visuals');
        const ctx = cvs.getContext('2d');
        const resize = () => { cvs.width = innerWidth; cvs.height = innerHeight; };
        resize();
        addEventListener('resize', resize);

        // Activity function for visual intensity
        function getActivity(t) {
            let a = 0.3;
            for (const ph of PHASES) {
                if (ph.bp !== null) {
                    const dist = Math.abs(t - ph.bp);
                    if (dist < 10) {
                        const norm = dist / 10;
                        const eased = norm * norm * (3 - 2 * norm);
                        a = Math.max(a, 0.3 + 0.7 * (1 - eased));
                    }
                }
            }
            return Math.min(1, a);
        }

        // Generate orb particles
        const ORBS = [];
        for (let i = 0; i < 60; i++) {
            ORBS.push({
                side: Math.random() < 0.5 ? -1 : 1,
                bx: (Math.random() * 0.35 + 0.03) * (Math.random() < 0.5 ? 1 : -1),
                by: (Math.random() - 0.5) * 1.4,
                r: 0.6 + Math.random() * 3,
                sp: 0.3 + Math.random() * 0.8,
                ph: Math.random() * Math.PI * 2,
                cr: 140 + Math.floor(Math.random() * 80),
                cg: 120 + Math.floor(Math.random() * 60),
                cb: 100 + Math.floor(Math.random() * 50),
                ba: 0.04 + Math.random() * 0.08
            });
        }

        let flashAlpha = 0;
        let prevBpNear = false;

        (function draw() {
            requestAnimationFrame(draw);
            const now = performance.now() / 1000;
            const t = isPlaying ? (now - startTime) % TOTAL_SEC : 0;
            const act = isPlaying ? getActivity(t) : 0;

            // Detect breakpoint flash moment
            let bpNear = false;
            for (const ph of PHASES) {
                if (ph.bp !== null && isPlaying && Math.abs(t - ph.bp) < 0.4) {
                    bpNear = true;
                    break;
                }
            }
            if (bpNear && !prevBpNear) flashAlpha = 0.15;
            prevBpNear = bpNear;
            flashAlpha *= 0.92;

            ctx.fillStyle = '#08080a';
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            // Breakpoint flash
            if (flashAlpha > 0.003) {
                ctx.fillStyle = `rgba(180,40,40,${flashAlpha})`;
                ctx.fillRect(0, 0, cvs.width, cvs.height);
            }

            const cx = cvs.width / 2, cy = cvs.height / 2;

            // Draw orbs
            for (const o of ORBS) {
                const breath = Math.sin(now * o.sp + o.ph);
                const drift = Math.sin(now * o.sp * 0.7 + o.ph * 1.3);
                const x = cx + o.bx * cvs.width * 0.45 + breath * 10 * act;
                const y = cy + o.by * cvs.height * 0.3 + drift * 8;
                const alpha = o.ba * (0.4 + act * 2.0) * (0.6 + breath * 0.4);

                ctx.beginPath();
                ctx.arc(x, y, o.r * (0.7 + act * 0.8), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${o.cr},${o.cg},${o.cb},${Math.max(0, Math.min(0.4, alpha))})`;
                ctx.fill();
            }

            // Faint centre divider
            const divAlpha = 0.012 + act * 0.025;
            ctx.strokeStyle = `rgba(255,255,255,${divAlpha})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(cx, 0);
            ctx.lineTo(cx, cvs.height);
            ctx.stroke();

            // Subtle channel glow during activity
            if (act > 0.5) {
                const glowAlpha = (act - 0.5) * 0.06;
                // Left glow
                const lg = ctx.createRadialGradient(cx * 0.4, cy, 0, cx * 0.4, cy, cvs.height * 0.4);
                lg.addColorStop(0, `rgba(120,140,160,${glowAlpha})`);
                lg.addColorStop(1, 'rgba(120,140,160,0)');
                ctx.fillStyle = lg;
                ctx.fillRect(0, 0, cx, cvs.height);

                // Right glow
                const rg = ctx.createRadialGradient(cx * 1.6, cy, 0, cx * 1.6, cy, cvs.height * 0.4);
                rg.addColorStop(0, `rgba(160,130,120,${glowAlpha})`);
                rg.addColorStop(1, 'rgba(160,130,120,0)');
                ctx.fillStyle = rg;
                ctx.fillRect(cx, 0, cx, cvs.height);
            }
        })();
    </script>
</body>
</html>
